<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="链客宝 - 一站式AI营销增长引擎，企业家的AI营销朋友圈。连接企业主、推广员与产品方，实现精准供需匹配。" />
    <meta name="keywords" content="链客宝, AI营销, 供需匹配, 企业家, 推广, 产品分销" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤝</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="链客宝">
    <title>链客宝 - 一站式AI营销增长引擎</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 注册 Service Worker（PWA 离线支持）
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('[PWA] Service Worker 注册成功:', reg.scope);
            // 检测更新
            reg.onupdatefound = function() {
              const installing = reg.installing;
              installing.onstatechange = function() {
                if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                  // 新版本已缓存, 通知用户
                  window.dispatchEvent(new CustomEvent('sw-update'));
                }
              };
            };
          }).catch(function(err) {
            console.warn('[PWA] Service Worker 注册失败:', err);
          });
        });
      }
    </script>
  </body>
</html>
