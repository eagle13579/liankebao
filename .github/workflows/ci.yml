name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 并发控制: 同一分支的蓝绿部署串行执行
concurrency:
  group: bluegreen-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOCKER_ORG: chainke
  SSH_USER: root
  SSH_HOST: 47.116.116.87
  DEPLOY_PATH: /var/www/chainke-full

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: chainke_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v --cov=app --cov=features --cov-report=term --cov-report=xml
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/chainke_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Run ruff
        working-directory: backend
        run: ruff check app/ features/ --output-format=github
      - name: Run mypy
        working-directory: backend
        run: mypy app/ --ignore-missing-imports --warn-unused-configs || true

  build-and-deploy:
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./deploy/docker/Dockerfile.prod
          push: true
          tags: |
            chainke/backend:latest
            chainke/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile.prod
          push: true
          tags: |
            chainke/frontend:latest
            chainke/frontend:${{ github.sha }}

      - name: Deploy to production
        run: |
          chmod +x ./deploy/aliyun_deploy.sh
          ./deploy/aliyun_deploy.sh
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 蓝绿部署 (Blue-Green Deploy)
  # ═══════════════════════════════════════════════════════════════════════════
  blue-green-deploy:
    name: 蓝绿部署
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50  # 需要足够的历史记录用于回滚

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine deploy target (blue or green)
        id: detect
        run: |
          # SSH 到服务器检测当前活跃环境
          if [ -n "${{ secrets.DEPLOY_KEY }}" ]; then
            echo "${{ secrets.DEPLOY_KEY }}" > /tmp/deploy_key
            chmod 600 /tmp/deploy_key
            SSH_CMD="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no"
          else
            echo "❌ DEPLOY_KEY secret not set"
            exit 1
          fi

          ACTIVE=$($SSH_CMD ${SSH_USER}@${SSH_HOST} \
            "cat ${DEPLOY_PATH}/deploy/.blue-green-state 2>/dev/null || echo 'none'")

          if [ "$ACTIVE" = "blue" ]; then
            echo "target=green" >> $GITHUB_OUTPUT
            echo "current=blue" >> $GITHUB_OUTPUT
          elif [ "$ACTIVE" = "green" ]; then
            echo "target=blue" >> $GITHUB_OUTPUT
            echo "current=green" >> $GITHUB_OUTPUT
          else
            echo "target=blue" >> $GITHUB_OUTPUT
            echo "current=none" >> $GITHUB_OUTPUT
          fi
          echo "Current: $ACTIVE → Target: $(echo "target=blue" | grep -oP '(?<=target=).+')"

      - name: Build and push backend (${{ steps.detect.outputs.target }})
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./deploy/docker/Dockerfile.prod
          push: true
          tags: |
            chainke/backend:${{ steps.detect.outputs.target }}
            chainke/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend (${{ steps.detect.outputs.target }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile.prod
          push: true
          tags: |
            chainke/frontend:${{ steps.detect.outputs.target }}
            chainke/frontend:${{ github.sha }}

      - name: Deploy to ${{ steps.detect.outputs.target }} via SSH
        run: |
          echo "${{ secrets.DEPLOY_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # 在服务器上执行蓝绿部署
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ${SSH_USER}@${SSH_HOST} "
            set -e

            cd ${DEPLOY_PATH}

            echo '[1/4] 拉取最新代码...'
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo \"✅ 当前提交: \$(git rev-parse --short HEAD)\"

            echo '[2/4] 确保脚本可执行...'
            chmod +x deploy/blue_green_deploy.sh deploy/rollback.sh deploy/healthcheck.sh

            echo '[3/4] 执行蓝绿部署...'
            bash deploy/blue_green_deploy.sh --force-${{ steps.detect.outputs.target }}

            echo '[4/4] 验证部署状态...'
            echo \"✅ 当前活跃: \$(cat deploy/.blue-green-state 2>/dev/null || echo 'unknown')\"
            echo \"✅ 部署历史:\"
            tail -5 deploy/.blue-green-history 2>/dev/null || echo '  (暂无历史)'
          " 2>&1

      - name: Notify deploy result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isSuccess = '${{ job.status }}' === 'success';
            const target = '${{ steps.detect.outputs.target }}' || 'unknown';
            const current = '${{ steps.detect.outputs.current }}' || 'unknown';
            console.log(`🟢 蓝绿部署完成: ${current} → ${target}, 状态: ${isSuccess ? '成功' : '失败'}`);
