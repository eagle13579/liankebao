# ──────────────────────────────────────────────
# 链客宝 CI 流水线
# ──────────────────────────────────────────────
# 触发条件：push / pull_request 到 main 或 develop
# 后端：Python 3.12 + FastAPI + pytest
# 前端：Node 20 + Vite + Vitest
# 代码检查：ruff（不阻断裂，仅警告）
# ──────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 后端 ──────────────────────────────────

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-timeout ruff

      - name: Lint check (ruff — warnings only)
        run: ruff check backend/ --output-format=github || true
        continue-on-error: true
        working-directory: backend

      - name: Run backend tests (pytest)
        run: pytest tests/ --timeout=60 -v
        working-directory: backend

      # ── 前端 ──────────────────────────────────

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests (vitest)
        run: npm run test -- --reporter verbose

      - name: Build frontend
        run: npm run build
