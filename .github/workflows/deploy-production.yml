# =============================================================================
# 链客宝 — 生产自动部署 (GitHub Actions)
# LianKeBao — Production Auto-Deploy Pipeline
#
# 触发条件: push 到 feat/gaia-evolution 分支
# 流程: 测试 → 构建 Docker 镜像 → SSH 部署 → 服务重启
# =============================================================================

name: Deploy to Production

on:
  push:
    branches:
      - feat/gaia-evolution
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试阶段'
        required: false
        default: false
        type: boolean
      deploy_only:
        description: '仅执行部署（跳过构建与测试）'
        required: false
        default: false
        type: boolean

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_BACKEND: ghcr.io/eagle13579/chainke-backend
  DOCKER_IMAGE_AGENTS: ghcr.io/eagle13579/chainke-agent-runtime
  APP_VERSION: ${{ github.sha }}
  SERVER_HOST: 47.116.116.87
  SERVER_USER: root
  APP_DIR: /root/liankebao

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !github.event.inputs.skip_tests && !github.event.inputs.deploy_only }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chainke
          POSTGRES_PASSWORD: chainke_test
          POSTGRES_DB: chainke_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U chainke
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://chainke:chainke_test@localhost:5432/chainke_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: |
          python -m pytest tests/ \
            -v --tb=short \
            --cov=app --cov-report=xml:coverage.xml --cov-report=term \
            --junitxml=test-results.xml -x --timeout=60

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/test-results.xml

      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Pytest Results
          path: backend/test-results.xml
          reporter: java-junit

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      !github.event.inputs.deploy_only
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/feat/gaia-evolution' }}

      - id: meta-agents
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_AGENTS }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/feat/gaia-evolution' }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/deploy/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: APP_VERSION=${{ env.APP_VERSION }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/deploy/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta-agents.outputs.tags }}
          labels: ${{ steps.meta-agents.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: APP_VERSION=${{ env.APP_VERSION }}

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: [test, build]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: |
            ${{ env.SERVER_HOST }} ecdsa-sha2-nistp256 ${{ secrets.SERVER_HOST_KEY }}
          if_key_exists: replace

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
              "echo 'SSH connection successful' && hostname"

      - name: Deploy to server
        shell: python
        run: |
          import subprocess, os, base64
          deploy_script = '''set -euo pipefail
          APP_DIR="$1"
          VERSION="$2"
          IMG_BACKEND="$3"
          IMG_AGENTS="$4"
          BACKEND_DIR="${APP_DIR}/backend"
          BRANCH="feat/gaia-evolution"

          echo "=== 链客宝 SSH 自动部署 ==="
          echo "版本: ${VERSION}"

          echo "[1/6] 切换到应用目录..."
          cd "${APP_DIR}"

          echo "[2/6] 拉取最新代码 (${BRANCH})..."
          git fetch origin "${BRANCH}"
          git checkout "${BRANCH}" 2>/dev/null || git checkout -b "${BRANCH}" "origin/${BRANCH}"
          git pull origin "${BRANCH}"
          echo "  HEAD: $(git rev-parse --short HEAD)"

          echo "[3/6] 安装 Python 依赖..."
          cd "${BACKEND_DIR}"
          if [ -f requirements.txt ]; then
              pip install -r requirements.txt 2>&1 | tail -3
          fi

          echo "[4/6] 创建必要目录..."
          mkdir -p data logs data/uploads

          echo "[5/6] 拉取最新 Docker 镜像..."
          if command -v docker &>/dev/null; then
              docker pull "${IMG_BACKEND}:latest" 2>/dev/null || echo "镜像拉取失败，使用本地构建"
              docker pull "${IMG_AGENTS}:latest" 2>/dev/null || echo "镜像拉取失败，使用本地构建"
          fi

          echo "[6/6] 重启服务..."
          cd "${APP_DIR}"
          if command -v systemctl &>/dev/null; then
              for svc in chainke-backend chainke-agents; do
                  if systemctl list-units --type=service --all 2>/dev/null | grep -q "${svc}"; then
                      echo "  Restarting ${svc}..."
                      systemctl restart "${svc}" 2>&1 || echo "  ${svc} 重启失败"
                  fi
              done
              systemctl daemon-reload 2>/dev/null || true
          fi
          if command -v docker &>/dev/null && [ -f "${BACKEND_DIR}/deploy/docker-compose.yml" ]; then
              echo "  Restarting via docker-compose..."
              cd "${BACKEND_DIR}/deploy"
              docker compose pull 2>/dev/null || true
              docker compose up -d --remove-orphans 2>&1 || echo "  docker-compose 重启失败"
          fi

          echo ""
          echo "=== 部署完成！==="
          echo "版本: ${VERSION}"
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
          '''

          host = os.environ['SERVER_HOST']
          user = os.environ['SERVER_USER']
          app_dir = os.environ['APP_DIR']
          version = os.environ['APP_VERSION']
          img_backend = os.environ['DOCKER_IMAGE_BACKEND']
          img_agents = os.environ['DOCKER_IMAGE_AGENTS']

          # Encode script to base64 to avoid shell escaping issues
          encoded = base64.b64encode(deploy_script.encode()).decode()

          cmd = [
            'ssh', '-o', 'StrictHostKeyChecking=accept-new',
            '-o', 'ConnectTimeout=30',
            f'{user}@{host}',
            f'echo {encoded} | base64 -d > /tmp/deploy_remote.sh && chmod +x /tmp/deploy_remote.sh && bash /tmp/deploy_remote.sh "{app_dir}" "{version}" "{img_backend}" "{img_agents}"'
          ]
          result = subprocess.run(cmd, capture_output=True, text=True)
          print(result.stdout)
          if result.returncode != 0:
            print(result.stderr)
            exit(result.returncode)

      - name: Health check
        run: |
          echo "等待服务启动..."
          sleep 10
          for i in $(seq 1 12); do
            HTTP_CODE=$(ssh -o StrictHostKeyChecking=accept-new \
                ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
                "curl -s -o /dev/null -w '%{http_code}' http://localhost:8201/health 2>/dev/null || echo '000'")
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "健康检查通过 (HTTP 200)"
              ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
                "curl -s http://localhost:8201/health | python3 -m json.tool 2>/dev/null || true"
              exit 0
            fi
            echo "  等待中... (尝试 $i/12, HTTP ${HTTP_CODE})"
            sleep 5
          done
          echo "健康检查超时 — 部署可能未完全成功"
          exit 1

      - if: always()
        run: |
          echo "## 链客宝部署报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | feat/gaia-evolution |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | ${{ env.SERVER_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 状态 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
