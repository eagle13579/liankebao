name: Deploy Production
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r backend/requirements.txt pytest pytest-cov
      - run: pytest backend/tests/ --cov=backend --cov-report=term --cov-fail-under=70

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Deploy
        env:
          DEPLOY_KEY: \${{ secrets.DEPLOY_KEY }}
          SERVER_HOST: \${{ secrets.SERVER_HOST }}
        run: |
          echo "Building Docker image..."
          docker build -t chainke:\${{ github.sha }} .
          echo "Deploying (blue-green)..."
          ssh -i \$DEPLOY_KEY root@\$SERVER_HOST \
            "docker pull chainke:\${{ github.sha }} && \
             docker-compose -f docker-compose.prod.yml up -d && \
             sleep 10 && \
             curl -f http://localhost:8001/health && \
             echo 'Deploy OK' || \
             (docker-compose rollback && echo 'Rollback triggered')"
