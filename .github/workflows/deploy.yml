# ============================================================
# 链客宝 手动部署流水线
# 触发方式: workflow_dispatch（GitHub Actions 手动触发）
# 目标服务器: 47.116.116.87
# ============================================================
name: 链客宝 手动部署

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "部署分支"
        required: true
        default: "develop"
        type: choice
        options:
          - develop
          - main
      deploy_frontend:
        description: "构建并部署前端"
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: "更新后端依赖并重启"
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    name: 🚀 SSH 部署到 47.116.116.87
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: 生成部署标识
        id: info
        run: |
          echo "BRANCH=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.116.116.87
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            echo "========================================"
            echo "  链客宝 手动部署"
            echo "  分支: ${{ steps.info.outputs.BRANCH }}"
            echo "  Commit: ${{ steps.info.outputs.COMMIT }}"
            echo "  时间: ${{ steps.info.outputs.TIME }}"
            echo "========================================"

            DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '/opt/liankebao' }}"

            # 1. 拉取最新代码
            echo "[1/5] 拉取代码..."
            cd "$DEPLOY_DIR"
            git fetch origin ${{ steps.info.outputs.BRANCH }}
            git reset --hard origin/${{ steps.info.outputs.BRANCH }}
            git clean -fd
            echo "  -> $(git rev-parse --short HEAD)"

            # 2. (可选) 后端依赖
            if [ "${{ github.event.inputs.deploy_backend }}" = "true" ]; then
              echo "[2/5] 安装后端依赖..."
              cd "$DEPLOY_DIR/backend"
              source venv/bin/activate 2>/dev/null || python3 -m venv venv
              source venv/bin/activate
              pip install --upgrade pip
              pip install -r requirements.txt
            else
              echo "[2/5] 跳过后端依赖安装"
            fi

            # 3. (可选) 前端构建
            if [ "${{ github.event.inputs.deploy_frontend }}" = "true" ]; then
              echo "[3/5] 前端构建..."
              cd "$DEPLOY_DIR"
              npm ci
              npm run build
            else
              echo "[3/5] 跳过前端构建"
            fi

            # 4. 重启后端服务
            echo "[4/5] 重启后端服务..."
            sudo systemctl restart liankebao 2>/dev/null || \
              sudo systemctl restart liankebao-backend 2>/dev/null || \
              echo "  ⚠ 未找到 systemd 服务，尝试 docker compose restart..."
            docker compose restart backend 2>/dev/null || true

            # 5. 健康检查
            echo "[5/5] 健康检查..."
            sleep 5
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  ✅ 后端健康检查通过 (尝试 $i/12)"
                break
              fi
              echo "  ⏳ 等待后端就绪... (尝试 $i/12, HTTP $HTTP_CODE)"
              sleep 5
              if [ $i -eq 12 ]; then
                echo "  ⚠ 后端未完全就绪，请手动排查"
              fi
            done

            echo ""
            echo "========================================"
            echo "  ✅ 部署完成！"
            echo "========================================"
