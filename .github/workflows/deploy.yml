# ============================================================
# 链客宝 GitHub Actions CI/CD 部署流水线
# 触发条件: push 到 main 分支
# 目标服务器: 阿里云 ECS (47.100.160.250)
# ============================================================
name: Deploy Chainke

on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

jobs:
  test-and-deploy:
    name: Test & Deploy
    runs-on: ubuntu-latest

    steps:
      # ---- 1. 检出代码 ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 2. 设置 Node.js（前端构建）----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: liankebao-weapp/package-lock.json

      # ---- 3. 前端构建 ----
      - name: Install frontend dependencies
        run: |
          cd liankebao-weapp
          npm ci
        working-directory: ${{ github.workspace }}

      - name: Build frontend
        run: |
          cd liankebao-weapp
          npm run build
        working-directory: ${{ github.workspace }}

      # ---- 4. 设置 Python（后端测试）----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ${{ github.workspace }}

      # ---- 5. 运行测试 ----
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        working-directory: ${{ github.workspace }}
        continue-on-error: false

      # ---- 6. 部署到服务器（SCP）----
      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: |
            liankebao-weapp/dist/
            backend/
            deploy/
            package.json
            chainke.service
            nginx.conf
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0
          overwrite: true

      # ---- 7. 远程执行部署脚本 ----
      - name: Restart services via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== 远程部署开始 ==="
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"

            # 移动前端构建产物到 dist 目录
            if [ -d "$DEPLOY_DIR/liankebao-weapp/dist" ]; then
              cp -r "$DEPLOY_DIR/liankebao-weapp/dist/"* "$DEPLOY_DIR/dist/"
              rm -rf "$DEPLOY_DIR/liankebao-weapp"
              echo "前端构建产物已部署"
            fi

            # 复制 nginx 安全配置
            if [ -f "$DEPLOY_DIR/deploy/nginx_security.conf" ]; then
              sudo cp "$DEPLOY_DIR/deploy/nginx_security.conf" /etc/nginx/nginx_security.conf
              echo "nginx_security.conf 已部署"
            fi

            # 执行部署脚本（跳过前端构建和 nginx 配置）
            sudo chmod +x "$DEPLOY_DIR/deploy.sh"
            cd "$DEPLOY_DIR"
            sudo bash deploy.sh --skip-frontend 2>&1

            echo "=== 远程部署完成 ==="

      # ---- 8. 部署验证 ----
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "=== 部署验证 ==="
            # 检查 nginx
            sudo nginx -t && echo "Nginx 配置检查通过" || echo "Nginx 配置检查失败"
            # 检查后端
            curl -s -o /dev/null -w "Health check: HTTP %{http_code}\n" http://127.0.0.1:8000/health || echo "健康检查失败"
            # 检查前端
            curl -s -o /dev/null -w "Frontend: HTTP %{http_code}\n" https://liankebao.top/ || echo "前端检查失败"
            echo "=== 验证完成 ==="
