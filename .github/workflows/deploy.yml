name: 链客宝 CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci && npm run build

      - name: Deploy via SSH with password
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get install -y -qq sshpass
          sshpass -e ssh -o StrictHostKeyChecking=no root@47.116.116.87 '
            cd /var/www/liankebao
            git fetch origin master
            git reset --hard origin/master
            git clean -fd
            VITE_API_BASE="" npm run build -- --logLevel error
            cd backend && source .venv/bin/activate && pip install -r requirements.txt -q
            systemctl daemon-reload && systemctl restart chainke-backend
            sleep 10
            curl -sf http://127.0.0.1:8001/health > /dev/null && echo "DEPLOY_OK" || echo "HEALTH_CHECK_FAILED"
          '
          # Start user-service
          echo "[4/5] Starting user-service..."
          cd /var/www/liankebao/user-service
          fuser -k 8002/tcp 2>/dev/null || true
          nohup /var/www/liankebao/backend/.venv/bin/python standalone_auth.py > user-service.log 2>&1 &
          sleep 3

          echo "[5/5] Health check..."
          sleep 10
          for i in 1 2 3 4 5 6 7 8; do
            MAIN=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/health 2>/dev/null || echo "000")
            USER=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/health 2>/dev/null || echo "000")
            echo "  Attempt $i/8: main=$MAIN user=$USER match=$MATCH"
            PAY=$(curl -s -o /dev/null -w "%%{http_code}" http://127.0.0.1:8006/health 2>/dev/null || echo "000")
          CRM=$(curl -s -o /dev/null -w "%%{http_code}" http://127.0.0.1:8005/health 2>/dev/null || echo "000")
          MATCH=$(curl -s -o /dev/null -w "%%{http_code}" http://127.0.0.1:8004/health 2>/dev/null || echo "000")
          [ "$MAIN" = "200" ] && [ "$USER" = "200" ] && [ "$NOTIF" = "200" ] && [ "$PAY" = "200" ] && [ "$CRM" = "200" ] && [ "$MATCH" = "200" ] && echo '✅ All OK' && exit 0
            sleep 5
          done
          echo '⚠️ Timeout'
