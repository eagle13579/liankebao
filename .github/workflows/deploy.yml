# ============================================================
# 链客宝 CI/CD 流水线
# 触发条件:
#   - push 到 develop 分支 → 构建 + 测试
#   - push 到 main 分支   → 构建 + 测试 + 部署到阿里云 ECS
# ============================================================
name: 链客宝 CI/CD

on:
  push:
    branches:
      - develop
      - main

jobs:
  # ----------------------------------------------------------
  # Job 1: 构建 + 测试（所有分支）
  # ----------------------------------------------------------
  build-and-test:
    name: Build & Test (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 安装依赖
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: 运行测试
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

  # ----------------------------------------------------------
  # Job 2: 部署到阿里云 ECS（仅 main 分支）
  # ----------------------------------------------------------
  deploy:
    name: Deploy to 阿里云 ECS
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 通过 SSH 部署到阿里云 ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "========================================"
            echo "  链客宝 自动部署 (CI/CD)"
            echo "  $(date '+%Y-%m-%d %H:%M:%S')"
            echo "========================================"

            # 1. git pull — 拉取最新代码
            cd ${{ secrets.DEPLOY_PATH }}
            echo "[1/4] 拉取最新代码 (main 分支)..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "  -> commit: $(git rev-parse --short HEAD)"

            # 2. pip install — 安装/更新 Python 依赖
            echo "[2/4] 安装 Python 依赖..."
            cd ${{ secrets.DEPLOY_PATH }}/backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q
            deactivate
            echo "  -> 依赖安装完成"

            # 3. 重启 uvicorn 后端
            echo "[3/4] 重启 uvicorn 后端..."
            sudo systemctl daemon-reload
            if systemctl is-active --quiet chainke; then
              sudo systemctl restart chainke
            else
              sudo systemctl start chainke
            fi
            echo "  -> chainke 服务已重启"

            # 等待后端就绪（最多 20 秒）
            echo "  -> 等待后端就绪..."
            for i in $(seq 1 10); do
              sleep 2
              if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/health | grep -q 200; then
                echo "  -> 后端健康检查通过 (尝试 $i/10)"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "  [WARN] 后端健康检查未通过，请手动排查"
              fi
            done

            # 4. nginx reload
            echo "[4/4] 重载 nginx 配置..."
            if sudo nginx -t; then
              sudo systemctl reload nginx || sudo systemctl restart nginx
              echo "  -> nginx 重载成功"
            else
              echo "  [ERROR] nginx 配置检查失败"
              exit 1
            fi

            echo ""
            echo "========================================"
            echo "  ✓ 部署完成！"
            echo "========================================"

      - name: 部署完成通知
        run: |
          echo "✅ 链客宝部署成功！"
          echo "   服务器: ${{ secrets.SSH_HOST }}"
          echo "   路径: ${{ secrets.DEPLOY_PATH }}"
          echo "   时间: $(date '+%Y-%m-%d %H:%M:%S')"
