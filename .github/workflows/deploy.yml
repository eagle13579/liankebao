# =============================================================================
# 链客宝 生产部署流水线 — 打通阿里云 CI/CD
#
# 触发条件:
#   - push 到 main 分支（自动部署）
#   - 手动触发 (workflow_dispatch)
#
# 流程:
#   1. 检出代码
#   2. 设置 Python 环境 & 安装依赖
#   3. 运行测试（阻断门禁）
#   4. 构建前端（npm install && npm run build）
#   5. 部署到阿里云服务器（SSH）
#   6. 健康检查 & 回滚
# =============================================================================

name: 链客宝 生产部署

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试（紧急修复时使用）'
        type: boolean
        default: false
      skip_build:
        description: '跳过前端构建（只拉代码+重启）'
        type: boolean
        default: false

concurrency:
  group: cd-prod-${{ github.ref }}
  cancel-in-progress: false  # 生产环境不允许取消进行中的部署

# =============================================================================
# 环境变量（全局）
# =============================================================================
env:
  SERVER_HOST: 47.116.116.87
  SERVER_USER: root
  DEPLOY_PATH: /var/www/chainke-full
  HEALTH_CHECK_URL: http://47.116.116.87:8001/health
  PYTHON_VERSION: "3.12"

jobs:
  # ── 阶段1: 测试 ───────────────────────────────────────────────────────────
  test:
    name: 测试门禁
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ inputs.skip_tests != true }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=junit.xml \
            -v

      - name: Gate — Test pass rate (must be 100%)
        if: success() || failure()
        run: |
          set -e
          if [ ! -f junit.xml ]; then
            echo "❌ junit.xml not found — tests may not have been run"
            exit 1
          fi
          TOTAL=$(grep -oP 'tests="\K[0-9]+' junit.xml | head -1)
          FAILURES=$(grep -oP 'failures="\K[0-9]+' junit.xml | head -1)
          ERRORS=$(grep -oP 'errors="\K[0-9]+' junit.xml | head -1)
          echo "Tests: $TOTAL | Failures: $FAILURES | Errors: $ERRORS"
          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "❌ No tests were executed"
            exit 1
          fi
          PASSED=$(( TOTAL - FAILURES - ERRORS ))
          if [ "$PASSED" -ne "$TOTAL" ]; then
            echo "❌ Test pass rate: $PASSED/$TOTAL — not 100%, blocking deploy"
            exit 1
          fi
          echo "✅ All $TOTAL tests passed (100%)"

      - name: Gate — Code coverage (must be >= 70%)
        if: success() || failure()
        run: |
          set -e
          if [ ! -f coverage.xml ]; then
            echo "❌ coverage.xml not found — coverage not reported"
            exit 1
          fi
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage.xml | head -1)
          if [ -z "$COVERAGE" ]; then
            echo "❌ Could not parse coverage from coverage.xml"
            exit 1
          fi
          PCT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.1f")
          THRESHOLD=70.0
          echo "Coverage: ${PCT}% (threshold: ${THRESHOLD}%)"
          if [ "$(echo "$PCT < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "❌ Coverage ${PCT}% is below ${THRESHOLD}% — blocking deploy"
            exit 1
          fi
          echo "✅ Coverage ${PCT}% meets the ${THRESHOLD}% threshold"

  # ── 阶段2: 构建 + 部署 ─────────────────────────────────────────────────────
  deploy:
    name: 构建 & 部署到阿里云
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]

    steps:
      # ── 2.1 检出代码 ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2.2 设置 Node.js（前端构建用） ──────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            deploy/docker/package-lock.json

      # ── 2.3 构建前端 ─────────────────────────────────────────────────────
      - name: Build frontend
        if: ${{ inputs.skip_build != true }}
        run: |
          if [ -f "package.json" ]; then
            echo "📦 Building main frontend..."
            npm install && npm run build -- --logLevel error
          fi
          if [ -d "liankebao-weapp" ]; then
            echo "📦 Building weapp frontend..."
            cd liankebao-weapp && npm install && npm run build -- --logLevel error
            cd ..
          fi
          if [ -d "liankebao-miniapp" ]; then
            echo "📦 Building miniapp frontend..."
            cd liankebao-miniapp && npm install && npm run build -- --logLevel error
            cd ..
          fi
          echo "✅ Frontend build complete"

      # ── 2.4 部署到阿里云（带重试机制） ──────────────────────────────────
      - name: Deploy to Aliyun via SSH (retry up to 3 times)
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
          SSH_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          # 确定 SSH 认证方式：优先使用密钥（DEPLOY_KEY），其次密码（DEPLOY_PASSWORD）
          if [ -n "$SSH_KEY" ]; then
            echo "🔑 Using SSH key authentication"
            echo "$SSH_KEY" > /tmp/deploy_key
            chmod 600 /tmp/deploy_key
            SSH_CMD="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10"
          elif [ -n "$SSHPASS" ]; then
            echo "🔑 Using SSH password authentication"
            sudo apt-get install -y -qq sshpass 2>/dev/null
            SSH_CMD="sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10"
          else
            echo "❌ Neither DEPLOY_KEY nor DEPLOY_PASSWORD secret is set"
            exit 1
          fi

          DEPLOY_SUCCESS=false
          for attempt in $(seq 1 3); do
            echo "--- 🚀 Deploy attempt $attempt/3 ---"
            $SSH_CMD \
              -o ServerAliveCountMax=5 \
              -o TCPKeepAlive=yes \
              -o LogLevel=ERROR \
              ${SERVER_USER}@${SERVER_HOST} "
                set -e

                echo '[1/6] 进入部署目录...'
                cd ${DEPLOY_PATH}

                echo '[2/6] 拉取最新代码...'
                git fetch origin main
                git reset --hard origin/main
                git clean -fd
                echo \"  ✅ 当前提交: \$(git rev-parse --short HEAD)\"

                echo '[3/6] 安装 Python 依赖...'
                if [ -d \"backend/.venv\" ]; then
                  source backend/.venv/bin/activate
                elif [ -f \"backend/venv/bin/activate\" ]; then
                  source backend/venv/bin/activate
                else
                  echo '  ⚠️  未找到虚拟环境，使用系统 Python'
                fi
                cd backend
                pip install -r requirements.txt -q --no-cache-dir
                cd ..

                echo '[4/6] 配置生产环境变量...'
                if [ ! -f \"backend/.env\" ] && [ -f \"deploy/production.env.example\" ]; then
                  echo '  ⚠️  .env 不存在，从 production.env.example 创建...'
                  cp deploy/production.env.example backend/.env
                  echo '  ⚠️  请手动填充 backend/.env 中的敏感值！'
                fi

                echo '[5/6] 重启服务...'
                if command -v systemctl >/dev/null 2>&1; then
                  systemctl daemon-reload
                  systemctl restart chainke
                  echo '  ✅ systemctl restart chainke'
                elif command -v supervisorctl >/dev/null 2>&1; then
                  supervisorctl restart chainke
                  echo '  ✅ supervisorctl restart chainke'
                elif command -v docker-compose >/dev/null 2>&1; then
                  docker-compose -f docker-compose.prod.yml up -d --build
                  echo '  ✅ docker-compose up -d'
                else
                  echo '  ⚠️  未检测到 systemctl/supervisorctl/docker-compose'
                  echo '  尝试直接启动 uvicorn（后台进程）...'
                  cd backend
                  nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2 > ../app.log 2>&1 &
                  echo \"  ✅ uvicorn PID: \$!\"
                  cd ..
                fi

                echo '[6/6] 健康检查...'
                sleep 10
                for i in \$(seq 1 6); do
                  HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' ${HEALTH_CHECK_URL} 2>/dev/null || echo '000')
                  if [ \"\$HTTP_CODE\" = \"200\" ]; then
                    echo \"  ✅ Health check passed (HTTP 200) on attempt \$i\"
                    echo \"DEPLOY_OK\"
                    exit 0
                  fi
                  echo \"  ⏳ Health check attempt \$i/6 - HTTP \$HTTP_CODE, waiting 5s...\"
                  sleep 5
                done
                echo '❌ Health check failed after 6 attempts'
                exit 1
              " 2>&1

            if [ $? -eq 0 ]; then
              echo "✅ Deploy attempt $attempt/3 succeeded"
              DEPLOY_SUCCESS=true
              break
            else
              echo "❌ Deploy attempt $attempt/3 failed, retrying in 10s..."
              sleep 10
            fi
          done

          if [ "$DEPLOY_SUCCESS" != "true" ]; then
            echo "❌ All 3 deploy attempts failed"
            exit 1
          fi

      # ── 2.5 清理 ─────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/deploy_key /tmp/deploy_key.pub

  # ── 阶段3: 通知 ───────────────────────────────────────────────────────────
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Notify Feishu on result
        uses: actions/github-script@v7
        with:
          script: |
            const isSuccess = '${{ needs.deploy.result }}' === 'success';
            const title = isSuccess
              ? '🟢 生产部署成功 — 链客宝'
              : '🔴 生产部署失败 — 链客宝';
            const text = [
              `**仓库:** ${context.repo.owner}/${context.repo.repo}`,
              `**分支:** \`${context.ref}\``,
              `**提交:** ${context.sha.substring(0, 7)}`,
              `**作者:** ${context.actor}`,
              `**触发:** ${context.eventName}`,
              `**测试结果:** ${{ needs.test.result }}`,
              `**部署结果:** ${{ needs.deploy.result }}`,
              `**运行:** ${context.runId}`,
              `**链接:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**服务器:** ${{ env.SERVER_HOST }}`,
            ].join('\n');

            const feishuUrl = process.env.FEISHU_WEBHOOK_URL;
            if (!feishuUrl) {
              console.log('⚠️  FEISHU_WEBHOOK_URL not set, skipping notification');
              return;
            }

            await fetch(feishuUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                msg_type: 'interactive',
                card: {
                  header: {
                    title: { tag: 'plain_text', content: title },
                    template: isSuccess ? 'green' : 'red',
                  },
                  elements: [
                    { tag: 'markdown', content: text },
                    { tag: 'hr' },
                    {
                      tag: 'action',
                      actions: [{
                        tag: 'button',
                        text: { tag: 'plain_text', content: '查看详情' },
                        url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                        type: 'default',
                      }],
                    },
                  ],
                },
              }),
            });
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
