# =============================================================================
# 链客宝 — Nginx 反向代理配置
# 前端静态资源 + API 反向代理 → 后端 FastAPI 服务
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # ── 爬虫检测 (用于预渲染 SEO) ──────────────────────────────────────────
    map $http_user_agent $is_bot {
        default 0;
        ~*(googlebot|bingbot|baiduspider|yandexbot|facebookexternalhit|twitterbot|
           rogerbot|linkedinbot|embedly|quora|pinterest|slack|vkshare|
           w3c_validator|whatsapp|applebot|semrushbot|ahrefsbot|dotbot|
           mj12bot|pingdom|petalbot|duckduckbot|slurp|archive\.org|
           ia_archiver|grapeshot|seznambot|sogou) 1;
    }

    # ── HTTP 服务 ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name liankebao.top www.liankebao.top _;

        # ── 前端 SPA 路由 ───────────────────────────────────────────────────
        # 先尝试静态文件（生产构建），回退到 index.html（SPA 模式）
        root /app/frontend;
        index index.html;

        # 去掉 SPA 路由的末尾斜杠，防止 $uri/ 目录检查导致 500
        location ~ ^/(.+)/$ {
            return 301 $scheme://$host/$1;
        }

        # ── 主路由 ──────────────────────────────────────────────────────
        # 爬虫 → 预渲染 HTML; 普通用户 → SPA
        location / {
            if ($is_bot = 1) {
                rewrite ^/$ /prerendered/index.html last;
                rewrite ^/(.+)$ /prerendered/$1.html last;
            }
            try_files $uri $uri/ /index.html;
        }

        # ── 预渲染静态文件 ──────────────────────────────────────────────
        # 仅允许内部 rewrite, 文件不存在时回退 SPA
        location ^~ /prerendered/ {
            internal;
            error_page 404 = @spa-fallback;
            try_files $uri =404;
        }

        location @spa-fallback {
            rewrite ^ /index.html break;
        }

        # ── 静态资源缓存 (带 hash 的文件名) ─────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── 后端 API 代理 ────────────────────────────────────────────────────
        # 兼容两种模式:
        #   1) Docker Compose (backend:8001 服务名)
        #   2) 本地直连 (127.0.0.1:8001)
        location /api/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # 健康检查端点直接透传
        location /health {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
        }

        # ── SEO 文件 (sitemap.xml / robots.txt) ─────────────────────────────
        # 动态生成，由后端 FastAPI 处理
        location = /sitemap.xml {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
        }
        location = /robots.txt {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
        }
    }
}
