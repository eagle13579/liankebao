# Digital Brochure 数据库迁移配置
# 独立于主应用的 chainke.db 迁移

[alembic]
# 迁移脚本路径
script_location = %(here)s/migrations_brochure
prepend_sys_path = .

# 数据库连接
sqlalchemy.url = sqlite:///%(here)s/data/digital_brochure.db

# 版本号格式
file_template = %%(rev)s_%%(slug)s

# 时区
# timezone = Asia/Shanghai

# 路径分隔符
path_separator = os

# 输出编码
output_encoding = utf-8

[post_write_hooks]

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
