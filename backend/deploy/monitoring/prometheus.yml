# =============================================================================
# 链客宝 — Prometheus 全局配置
# =============================================================================
# 全局配置
global:
  scrape_interval:     15s      # 采集间隔
  evaluation_interval: 15s      # 规则评估间隔
  scrape_timeout:      10s      # 采集超时
  external_labels:
    monitor: 'chainke-production'
    environment: 'production'

# ── 告警规则文件 ──────────────────────────────────────────────────────────
rule_files:
  - '/etc/prometheus/rules/*.yml'

# ── 采集目标 ──────────────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus 自身 ──────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']
        labels:
          service: 'monitoring'
          component: 'prometheus'

  # ── 链客宝 Backend API ───────────────────────────────────────────────
  - job_name: 'chainke-backend'
    metrics_path: '/metrics'
    scheme: http
    static_configs:
      - targets:
          - 'host.docker.internal:8201'    # 宿主机 backend (Docker Desktop)
          - 'backend:8201'                  # 同 docker-compose 网络
        labels:
          service: 'chainke-backend'
          tier: 'api'

  # ── 链客宝 Agent Runtime ─────────────────────────────────────────────
  - job_name: 'chainke-agent-runtime'
    metrics_path: '/metrics'
    scheme: http
    static_configs:
      - targets:
          - 'host.docker.internal:8202'    # 宿主机 agent runtime
          - 'agent-runtime:8202'            # 同 docker-compose 网络
        labels:
          service: 'chainke-agent-runtime'
          tier: 'agents'

  # ── Node Exporter (宿主机) ───────────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          tier: 'infrastructure'

# ── 告警通知配置 (AlertManager) ──────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      scheme: http
      timeout: 10s
      api_version: v2
