# =============================================================================
# Grafana — 仪表盘自动配置
# =============================================================================
apiVersion: 1

providers:
  - name: '链客宝 Production Dashboards'
    orgId: 1
    folder: '链客宝'
    folderUid: 'chainke'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
