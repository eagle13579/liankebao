apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.existingSecret }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chainke.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  JWT_SECRET: "replace-with-real-secret"
  DATABASE_URL: "postgresql+asyncpg://chainke:replace-me@chainke-postgres:5432/chainke"
  REDIS_PASSWORD: "replace-me"
  DEEPSEEK_API_KEY: "replace-me"
  SENTRY_DSN: ""
