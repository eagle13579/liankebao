# =============================================================================
# 链客宝 — HAProxy 配置 (Patroni 读写分离)
# =============================================================================
# 端口 5000: 读写 (主库)
# 端口 5001: 只读 (从库)
# 端口 5002: 管理界面
# =============================================================================

global
    daemon
    maxconn 2000
    log stdout format raw local0
    stats socket /var/run/haproxy.sock mode 600 level admin

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    retries 3
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    timeout check 5000ms

# ── 读写端口 (主库) ──────────────────────────────────────────────────────────
frontend patroni-write-frontend
    bind *:5000
    default_backend patroni-write-backend

backend patroni-write-backend
    option httpchk GET /master
    http-check expect status 200
    default-server inter 3s fall 3 rise 2

    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# ── 只读端口 (从库) ──────────────────────────────────────────────────────────
frontend patroni-read-frontend
    bind *:5001
    default_backend patroni-read-backend

backend patroni-read-backend
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2

    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# ── 管理界面 ──────────────────────────────────────────────────────────────────
frontend stats-frontend
    bind *:5002
    mode http
    default_backend stats-backend

backend stats-backend
    mode http
    stats enable
    stats uri /haproxy
    stats refresh 10s
    stats admin if LOCALHOST
    stats auth admin:${HAPROXY_STATS_PASSWORD:-admin}
