# =============================================================================
# 链客宝 — Patroni 配置模板 (用于 standalone Patroni 部署)
# =============================================================================
# 将此模板放置在每个 Patroni 节点的 /etc/patroni/config.yml
# =============================================================================

namespace: chainke
scope: chainke
name: ${PATRONI_NAME}

# ── etcd 集群 ──
etcd3:
  hosts:
    - host: ${ETCD_HOSTS:-etcd1:2379,etcd2:2379,etcd3:2379}
  # 如果 etcd 启用认证:
  # username: ${ETCD_USERNAME:-}
  # password: ${ETCD_PASSWORD:-}

# ── REST API ──
restapi:
  listen: 0.0.0.0:8008
  connect_address: ${PATRONI_RESTAPI_CONNECT_ADDRESS}
  # 认证 (按需启用):
  # auth: '${RESTAPI_USERNAME:-admin}:${RESTAPI_PASSWORD:-changeme}'
  # 允许跨域:
  # cors: '*'

# ── 一致性检查 ──
consensus:
  dcs_sync_timeout: 30
  retry_timeout: 10

# ── 重试 ──
retry_timeout: 10
ttl: 30
loop_wait: 10
maximum_lag_on_failover: 1048576  # 1MB

# ── PostgreSQL ──
postgresql:
  name: ${PATRONI_NAME}
  listen: 0.0.0.0:5432
  connect_address: ${PATRONI_POSTGRESQL_CONNECT_ADDRESS}
  data_dir: ${PATRONI_POSTGRESQL_DATA_DIR:-/data/postgresql}
  bin_dir: /usr/lib/postgresql/16/bin
  pgpass: /tmp/pgpass
  authentication:
    replication:
      username: ${PATRONI_REPLICATION_USERNAME:-replicator}
      password: ${PATRONI_REPLICATION_PASSWORD:-repl_secret}
    superuser:
      username: ${PATRONI_SUPERUSER_USERNAME:-postgres}
      password: ${PATRONI_SUPERUSER_PASSWORD:-postgres_secret}
    rewind:
      username: ${PATRONI_REWIND_USERNAME:-rewind_user}
      password: ${PATRONI_REWIND_PASSWORD:-rewind_secret}
  parameters:
    # ── 性能参数 ──
    shared_buffers: 256MB
    wal_level: replica
    hot_standby: "on"
    max_connections: 200
    max_wal_senders: 10
    max_replication_slots: 10
    wal_keep_size: 1024     # 1GB
    min_wal_size: 512       # 512MB
    max_wal_size: 4096       # 4GB
    checkpoint_completion_target: 0.9
    work_mem: 16MB
    maintenance_work_mem: 128MB
    effective_cache_size: 1GB
    # ── 日志 ──
    log_destination: stderr
    logging_collector: "on"
    log_directory: /data/pg_log
    log_filename: postgresql-%Y-%m-%d_%H%M%S.log
    log_rotation_age: 1440   # 1 day
    log_rotation_size: 100MB
    log_statement: none
    log_min_duration_statement: 1000  # 慢查询阈值 (ms)

# ── 连接池 PgBouncer 集成 ──
# pgbouncer:
#   connect_address: pgbouncer:6432
#   pool_mode: transaction
#   default_pool_size: 50

# ── 标签 (用于调度) ──
tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
