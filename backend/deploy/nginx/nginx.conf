# =============================================================================
# 链客宝 — Nginx 生产配置 (SSL + Gzip + 安全头部 + 速率限制 + CDN 回源)
# =============================================================================
# 适用场景: Docker 容器 / 裸机部署
# CDN 回源说明:
#   如果 CDN (Cloudflare) 在前端，Nginx 只需监听 80 (或 127.0.0.1:80)，
#   SSL 证书由 Cloudflare 管理。
#   如果 CDN 只代理静态资源，Nginx 需要监听 443 并配置 SSL 证书。
# =============================================================================

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 基础优化 ──────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100m;

    # ── 日志格式 ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip 压缩 ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2
        font/ttf;

    # ── 速率限制 (Zone 定义) ───────────────────────────────────────────────────
    # 每个 IP 每秒最多 30 个请求
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # 每个 IP 每分钟最多 300 个请求 (突发)
    limit_req_zone $binary_remote_addr zone=api_burst:10m rate=5r/s;
    # 连接限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── 上游后端 ──────────────────────────────────────────────────────────────
    upstream chainke-backend {
        least_conn;
        server 127.0.0.1:8201 max_fails=3 fail_timeout=30s;
        # K8s 内部使用 service DNS:
        # server chainke-backend-service.chainke-prod.svc.cluster.local:80;
        keepalive 32;
    }

    upstream chainke-agent {
        server 127.0.0.1:8202 max_fails=3 fail_timeout=30s;
        # server chainke-agent-service.chainke-prod.svc.cluster.local:8202;
        keepalive 16;
    }

    # ── 开放文件缓存 ──────────────────────────────────────────────────────────
    open_file_cache max=2000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── HTTP → HTTPS 重定向 ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.liankebao.top liankebao.top www.liankebao.top _;
        return 301 https://$server_name$request_uri;
    }

    # ── HTTPS 服务 ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.liankebao.top;

        # ── SSL 证书 ──
        # 如果使用 Cloudflare Full (Strict) 模式，Cloudflare 处理 SSL
        # 如果 Nginx 直接暴露，请配置以下证书:
        ssl_certificate     /etc/ssl/certs/liankebao.crt;
        ssl_certificate_key /etc/ssl/private/liankebao.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        # HSTS (Strict-Transport-Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── 安全头部 ──────────────────────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval';
            style-src  'self' 'unsafe-inline';
            img-src    'self' data: blob: https:;
            font-src   'self' data:;
            connect-src 'self' https://api.liankebao.top wss://api.liankebao.top;
            media-src  'self';
            object-src 'none';
            frame-src  'self';
            base-uri   'self';
            form-action 'self';
            manifest-src 'self';
        " always;

        # ── 后端 API 代理 ────────────────────────────────────────────────────
        location /api/ {
            # 速率限制
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://chainke-backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时
            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # 缓冲
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # CDN 透传
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Agent Runtime ───────────────────────────────────────────────────
        location /agent/ {
            limit_req zone=api_burst burst=5 nodelay;

            proxy_pass http://chainke-agent/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── WebSocket 端点 ─────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://chainke-backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── 健康检查 ────────────────────────────────────────────────────────
        location /health {
            proxy_pass http://chainke-backend/health;
            proxy_set_header Host $host;
            proxy_cache off;
            access_log off;
        }

        # ── Metrics ─────────────────────────────────────────────────────────
        location /metrics {
            proxy_pass http://chainke-backend/metrics;
            proxy_set_header Host $host;
            access_log off;
            # 限制内部网络访问
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        # ── 静态资源 (前端 SPA 或上传文件) ─────────────────────────────────
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── SEO 文件 ─────────────────────────────────────────────────────────
        location = /sitemap.xml {
            proxy_pass http://chainke-backend/sitemap.xml;
        }
        location = /robots.txt {
            proxy_pass http://chainke-backend/robots.txt;
        }

        # ── 拒绝访问隐藏/敏感文件 ─────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ (\.env|\.git|composer\.json|package\.json|yarn\.lock)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── 404 处理 ─────────────────────────────────────────────────────────
        error_page 404 /index.html;

        # ── 500 处理 ─────────────────────────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
