version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: chainke-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chainke
      POSTGRES_PASSWORD: 链客宝2024
      POSTGRES_DB: chainke
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainke -d chainke"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: chainke_pgdata
