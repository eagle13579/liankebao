apiVersion: v1
kind: Service
metadata:
  name: chainke-agent-service
  namespace: chainke-prod
  labels:
    app: chainke-agent
    app.kubernetes.io/name: chainke
    app.kubernetes.io/component: agent-runtime
    app.kubernetes.io/part-of: chainke-backend
  annotations:
    # 仅集群内部可访问（不对外暴露）
    service.kubernetes.io/load-balancer-type: "Internal"
spec:
  type: ClusterIP
  selector:
    app: chainke-agent
    tier: agent
  ports:
    - name: agent-http
      protocol: TCP
      port: 8202
      targetPort: 8202
    - name: metrics
      protocol: TCP
      port: 9091
      targetPort: 8202
