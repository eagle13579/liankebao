# =============================================================================
# 链客宝 — Secrets 模板
# 使用前请替换所有占位值！
# =============================================================================
# 创建真实 Secret:
#   kubectl create secret generic chainke-secret \
#     --namespace chainke-prod \
#     --from-literal=JWT_SECRET='<256-bit-hex-key>' \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://chainke:<password>@chainke-postgres:5432/chainke' \
#     --from-literal=REDIS_PASSWORD='<redis-password>' \
#     --from-literal=DEEPSEEK_API_KEY='<deepseek-key>' \
#     --from-literal=SENTRY_DSN='<sentry-dsn>'
#
# 或使用 Sealed Secrets / External Secrets Operator 管理
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: chainke-secret
  namespace: chainke-prod
  labels:
    app: chainke-backend
    app.kubernetes.io/name: chainke
    app.kubernetes.io/part-of: chainke-backend
type: Opaque
stringData:
  # ── JWT ──
  JWT_SECRET: "change-me-to-a-256-bit-random-hex-key"

  # ── 数据库 ──
  DATABASE_URL: "postgresql+asyncpg://chainke:change-me@chainke-postgres:5432/chainke"

  # ── Redis ──
  REDIS_PASSWORD: "change-me"

  # ── AI ──
  DEEPSEEK_API_KEY: "change-me"

  # ── 错误追踪 ──
  SENTRY_DSN: ""

  # ── 微信小程序 ──
  WECHAT_MINI_APPID: "change-me"
  WECHAT_MINI_SECRET: "change-me"

  # ── 微信支付 ──
  WECHAT_MCH_ID: "change-me"
  WECHAT_PAY_API_KEY: "change-me"
  WECHAT_PAY_V3_KEY: "change-me"

  # ── 支付宝 ──
  ALIPAY_APP_ID: "change-me"
  ALIPAY_PRIVATE_KEY: "change-me"
  ALIPAY_PUBLIC_KEY: "change-me"
