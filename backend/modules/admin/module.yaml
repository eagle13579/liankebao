name: admin
version: "1.0.0"
description: 管理后台
author: 链客宝
dependencies:
  - auth
routes:
  prefix: /api/admin
  auth_required: true
frontend:
  entry: ./frontend/AdminModule
  routes:
    - /admin
    - /admin/users
    - /admin/settings
    - /admin/logs
permissions:
  - admin.access
  - admin.users
  - admin.settings
  - admin.logs
