name: orders
version: "1.0.0"
description: 订单管理
author: 链客宝
dependencies:
  - auth
  - products
routes:
  prefix: /api/orders
  auth_required: true
frontend:
  entry: ./frontend/OrdersModule
  routes:
    - /orders
    - /orders/:id
permissions:
  - orders.view
  - orders.create
  - orders.update
  - orders.cancel
