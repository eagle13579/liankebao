name: contacts
version: "1.0.0"
description: 人脉管理
author: 链客宝
dependencies:
  - auth
routes:
  prefix: /api/contacts
  auth_required: true
frontend:
  entry: ./frontend/ContactsModule
  routes:
    - /contacts
    - /contacts/groups
permissions:
  - contacts.view
  - contacts.create
  - contacts.edit
  - contacts.delete
  - contacts.groups
