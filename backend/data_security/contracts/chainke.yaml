        min: 1
      hs_code:
        regex: "^\\d{4}\\.\\d{2}(\\.\\d{2})?(\\.\\d{2})?$"
        max_length: 20
      status:
        enum: ["pending", "booked", "picked_up", "in_transit",
               "port_arrival", "customs_clearance", "out_for_delivery",
               "delivered", "signed", "returned", "exception", "lost"]
      exception_flag:
        enum: [true, false]
    not_allowed:
