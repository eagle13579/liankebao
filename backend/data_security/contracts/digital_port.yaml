      fee_currency:
        enum: ["CNY", "KRW", "USD", "JPY", "EUR"]
      max_participants:
        min: 1
      current_participants:
        min: 0
      booth_price_min:
        min: 0.0
      booth_price_max:
        min: 0.0
      view_count:
        min: 0
      registration_count:
        min: 0
      is_featured:
        enum: [true, false]
      sort_order:
        min: 0
      status:
        enum: ["draft", "published", "registration_open", "registration_closed",
               "ongoing", "completed", "cancelled", "postponed"]
      description:
        max_length: 10000
    not_allowed:
