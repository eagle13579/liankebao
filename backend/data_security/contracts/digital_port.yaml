      - title
      - policy_type
      - issuing_authority
      - publish_date
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      title:
        max_length: 300
        min_length: 1
      title_en:
        max_length: 300
      title_ko:
        max_length: 300
      policy_type:
        enum: ["tariff", "tax_incentive", "subsidy", "regulation",
               "trade_agreement", "visa_policy", "standard", "certification",
               "finance_policy", "logistics_policy", "other"]
      policy_category:
        max_length: 100
      issuing_authority:
        max_length: 200
      target_audience:
        enum: ["all", "chinese_enterprise", "korean_enterprise",
               "individual", "association", "specific_industry"]
      importance:
        enum: ["low", "medium", "high", "urgent"]
      urgency:
        enum: ["low", "medium", "high", "critical"]
      view_count:
        min: 0
      favorite_count:
        min: 0
      status:
        enum: ["draft", "published", "archived", "deprecated"]
      content:
        max_length: 50000
      summary:
        max_length: 1000
      source_url:
        format: uri
        max_length: 1024
      contact_email:
        format: email
        max_length: 255
    not_allowed:
      - internal_analysis
      - government_contact_internal

