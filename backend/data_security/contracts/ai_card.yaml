               "portfolio", "case_study", "newsletter", "recruitment",
               "event_brochure", "other"]
      cover_image_url:
        format: uri
        max_length: 1024
      file_url:
        format: uri
        max_length: 1024
      file_format:
        enum: ["pdf", "pptx", "docx", "xlsx", "jpg", "png", "mp4",
               "keynote", "pages", "numbers", "other"]
      file_size:
        min: 0
      page_count:
        min: 1
      is_public:
        enum: [true, false]
      allow_download:
        enum: [true, false]
      status:
        enum: ["draft", "published", "archived", "deleted"]
      sort_order:
        min: 0
      content:
        max_length: 50000
      summary:
        max_length: 500
    not_allowed:
      - internal_review_notes
      - approval_workflow

