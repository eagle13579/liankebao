      - youtube_url
      - tiktok_url
      - website_url
      - company_website
      - qr_code_url
      - avatar_url
      - cover_url
      - company_logo_url
      - slogan
      - slogan_en
      - slogan_ko
      - introduction
      - introduction_en
      - introduction_ko
      - skills
      - expertise
      - certifications
      - education
      - honors
      - languages
      - service_items
      - business_hours
      - address
      - address_en
      - address_ko
      - map_location
      - tags
      - theme_color
      - font_style
      - layout_style
      - is_public
      - allow_download
      - allow_share
      - allow_comment
      - visit_count
      - share_count
      - download_count
      - like_count
      - rating
      - status
      - published_at
      - expired_at
      - created_at
      - updated_at
    required:
      - uuid
      - user_id
      - display_name
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      user_id:
        min: 1
      display_name:
        max_length: 200
        min_length: 1
      display_name_en:
        max_length: 200
      display_name_ko:
        max_length: 200
      mobile:
        format: phone
        max_length: 20
      email_work:
        format: email
        max_length: 255
      email_personal:
        format: email
        max_length: 255
      wechat_id:
        max_length: 50
      qr_code_url:
        format: uri
        max_length: 1024
      avatar_url:
        format: uri
        max_length: 1024
      cover_url:
        format: uri
        max_length: 1024
      slogan:
        max_length: 200
      introduction:
        max_length: 2000
      skills:
        type: list
      languages:
        type: list
      theme_color:
        regex: "^#[0-9a-fA-F]{6}$"
        max_length: 7
      layout_style:
        enum: ["classic", "modern", "minimal", "business", "creative"]
      is_public:
        enum: [true, false]
      allow_download:
        enum: [true, false]
      allow_share:
        enum: [true, false]
      status:
        enum: ["draft", "published", "archived", "disabled"]
      visit_count:
        min: 0
      rating:
        min: 0.0
        max: 5.0
    not_allowed:
      - internal_score
      - ai_analysis_raw
      - face_encoding
      - voiceprint_data
      - id_card_info
      - passport_info

  # --------------------------------------------------------------------------
  # brochures — 电子画册表 (module_ai_card schema)
  # --------------------------------------------------------------------------
  - name: brochures
    description: "电子画册 — 企业产品与服务展示"
    allowed_fields:
