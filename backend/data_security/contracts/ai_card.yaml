# ============================================================================
# AI 名片模块 (AI Card) 数据契约
# 模块名: ai_card
# 版本: 1.0
# 契约 Schema: 2.0
# ============================================================================
# 本契约定义了 AI名片功能模块在 core schema 和自身 schema 中
# 所有表的字段白名单、必填约束、校验规则与禁用字段。
# ============================================================================

module: ai_card
version: "1.0"
contract_schema: "2.0"
description: "AI名片模块数据契约 —— 涵盖名片档案、电子画册、供需匹配、访客日志等子模块"

tables:
  # --------------------------------------------------------------------------
  # users — 核心用户表 (core schema)
  # --------------------------------------------------------------------------
  - name: users
    description: "核心用户表 — AI名片模块可读写的用户字段子集"
    allowed_fields:
      - id
      - uuid
      - username
      - nickname
      - real_name
      - email
      - phone
      - avatar_url
      - gender
      - language
      - timezone
      - country
      - province
      - city
      - company
      - position
      - bio
      - website
      - wechat_openid
      - wechat_unionid
      - status
      - created_at
      - updated_at
      - last_login_at
    required:
      - uuid
      - username
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      username:
        regex: "^[a-zA-Z0-9_@.\\-]{3,64}$"
        min_length: 3
        max_length: 64
      email:
        format: email
        max_length: 255
      phone:
        format: phone
        max_length: 20
      gender:
        enum: ["male", "female", "other", "unknown"]
      status:
        enum: ["active", "inactive", "suspended", "deleted"]
      language:
        enum: ["zh-CN", "en-US", "ko-KR", "ja-JP"]
      nickname:
        max_length: 100
      real_name:
        max_length: 100
      company:
        max_length: 200
      position:
        max_length: 200
      bio:
        max_length: 500
      avatar_url:
        format: uri
        max_length: 1024
      website:
        format: uri
        max_length: 1024
    not_allowed:
      - password_hash
      - password_salt
      - mfa_secret
      - mfa_enabled
      - api_key
      - api_key_hashed
      - secret_question
      - secret_answer
      - login_attempts
      - locked_until
      - deleted_at
      - internal_notes
      - internal_tags

  # --------------------------------------------------------------------------
  # organizations — 组织表 (core schema)
  # --------------------------------------------------------------------------
  - name: organizations
    description: "组织表 — AI名片模块可读写的组织字段子集"
    allowed_fields:
      - id
      - uuid
      - name
      - name_en
      - name_ko
      - short_name
      - logo_url
      - banner_url
      - industry
      - industry_category
      - company_type
      - registration_number
      - tax_number
      - address
      - address_en
      - country
      - province
      - city
      - district
      - zip_code
      - contact_phone
      - contact_email
      - website
      - social_links
      - description
      - description_en
      - description_ko
      - employee_count_min
      - employee_count_max
      - annual_revenue
      - credit_level
      - business_scope
      - certifications
      - status
      - verified_at
      - created_at
      - updated_at
    required:
      - uuid
      - name
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      name:
        max_length: 200
        min_length: 1
      name_en:
        max_length: 200
      name_ko:
        max_length: 200
      logo_url:
        format: uri
        max_length: 1024
      industry:
        max_length: 100
      industry_category:
        max_length: 100
      company_type:
        enum: ["enterprise", "individual", "government", "nonprofit", "other"]
      contact_email:
        format: email
        max_length: 255
      contact_phone:
        format: phone
        max_length: 20
      website:
        format: uri
        max_length: 1024
      status:
        enum: ["active", "inactive", "pending", "suspended", "deleted"]
      employee_count_min:
        min: 0
      employee_count_max:
        min: 0
      credit_level:
        enum: ["AAA", "AA", "A", "B", "C", "D"]
      address:
        max_length: 500
      description:
        max_length: 2000
    not_allowed:
      - internal_rating
      - risk_level
      - compliance_flags
      - kyc_documents
      - legal_representative_id
      - bank_accounts
      - financial_data
      - internal_tags
      - deleted_at

  # --------------------------------------------------------------------------
  # members — 成员表 (core schema)
  # --------------------------------------------------------------------------
  - name: members
    description: "组织成员表 — 用户与组织的关联关系"
    allowed_fields:
      - id
      - uuid
      - user_id
      - organization_id
      - role
      - roles
      - department
      - title
      - is_primary
      - is_admin
      - status
      - joined_at
      - expired_at
      - created_at
      - updated_at
    required:
      - uuid
      - user_id
      - organization_id
      - role
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      user_id:
        min: 1
      organization_id:
        min: 1
      role:
        enum: ["owner", "admin", "manager", "member", "viewer", "guest"]
      roles:
        type: list
      department:
        max_length: 200
      title:
        max_length: 200
      is_primary:
        enum: [true, false]
      is_admin:
        enum: [true, false]
      status:
        enum: ["active", "inactive", "expired", "removed"]
    not_allowed:
      - permissions_bitmask
      - internal_notes

  # --------------------------------------------------------------------------
  # products — 产品表 (core schema)
  # --------------------------------------------------------------------------
  - name: products
    description: "产品表 — AI名片可读写的产品字段子集"
    allowed_fields:
      - id
      - uuid
      - organization_id
      - name
      - name_en
      - name_ko
      - category
      - sub_category
      - description
      - description_en
      - description_ko
      - keywords
      - price_min
      - price_max
      - currency
      - unit
      - images
      - thumbnail_url
      - tags
      - status
      - is_featured
      - sort_order
      - created_at
      - updated_at
      - published_at
    required:
      - uuid
      - organization_id
      - name
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      organization_id:
        min: 1
      name:
        max_length: 200
        min_length: 1
      name_en:
        max_length: 200
      name_ko:
        max_length: 200
      category:
        max_length: 100
      description:
        max_length: 4000
      price_min:
        min: 0.0
      price_max:
        min: 0.0
      currency:
        max_length: 3
        enum: ["CNY", "USD", "KRW", "JPY", "EUR", "GBP", "HKD", "SGD"]
      unit:
        max_length: 50
      images:
        type: list
      thumbnail_url:
        format: uri
        max_length: 1024
      status:
        enum: ["draft", "published", "archived", "deleted"]
      is_featured:
        enum: [true, false]
      sort_order:
        min: 0
    not_allowed:
      - cost_price
      - profit_margin
      - supplier_info
      - inventory_quantity
      - inventory_alert
      - internal_notes

  # --------------------------------------------------------------------------
  # tags — 标签表 (core schema)
  # --------------------------------------------------------------------------
  - name: tags
    description: "标签表 — 系统级标签定义"
    allowed_fields:
      - id
      - uuid
      - name
      - name_en
      - name_ko
      - slug
      - type
      - category
      - icon
      - color
      - description
      - sort_order
      - is_system
      - status
      - created_at
      - updated_at
    required:
      - uuid
      - name
      - type
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      name:
        max_length: 100
        min_length: 1
      slug:
        regex: "^[a-z0-9_-]{1,100}$"
        max_length: 100
      type:
        enum: ["industry", "product", "skill", "interest", "region",
               "certification", "custom", "system"]
      category:
        max_length: 100
      sort_order:
        min: 0
      is_system:
        enum: [true, false]
      status:
        enum: ["active", "inactive", "deleted"]
    not_allowed: []

  # --------------------------------------------------------------------------
  # user_tags — 用户标签关联表 (core schema)
  # --------------------------------------------------------------------------
  - name: user_tags
    description: "用户标签关联表 — 用户与标签的多对多关系"
    allowed_fields:
      - id
      - user_id
      - tag_id
      - tag_type
      - source
      - weight
      - created_at
    required:
      - user_id
      - tag_id
    constraints:
      user_id:
        min: 1
      tag_id:
        min: 1
      tag_type:
        enum: ["industry", "product", "skill", "interest", "region",
               "certification", "custom", "system"]
      source:
        enum: ["user_self", "system_auto", "admin_assign", "import",
               "ai_infer", "match_derive"]
      weight:
        min: 0.0
        max: 1.0
    not_allowed: []

  # --------------------------------------------------------------------------
  # events — 事件日志表 (core schema)
  # --------------------------------------------------------------------------
  - name: events
    description: "事件日志表 — AI名片模块操作事件记录"
    allowed_fields:
      - id
      - uuid
      - event_type
      - event_name
      - module
      - source
      - user_id
      - organization_id
      - target_type
      - target_id
      - payload
      - ip_address
      - user_agent
      - session_id
      - request_id
      - status
      - duration_ms
      - error_message
      - created_at
    required:
      - uuid
      - event_type
      - event_name
      - module
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      event_type:
        enum: ["create", "read", "update", "delete", "login", "logout",
               "share", "export", "import", "match", "scan", "sync",
               "verify", "reject", "approve", "error", "other"]
      event_name:
        max_length: 200
      module:
        regex: "^[a-z_]{2,50}$"
        max_length: 50
      source:
        enum: ["web", "mobile_ios", "mobile_android", "weapp", "api",
               "admin", "system", "cron", "import"]
      target_type:
        max_length: 50
      status:
        enum: ["success", "failure", "pending", "processing"]
      duration_ms:
        min: 0
      ip_address:
        max_length: 45
      user_agent:
        max_length: 500
      request_id:
        max_length: 64
      error_message:
        max_length: 2000
    not_allowed:
      - user_token
      - raw_request
      - raw_response
      - sensitive_data

