      - feedback_score
      - feedback_comment
      - is_read
      - created_at
      - updated_at
    required:
      - uuid
      - supply_id
      - demand_id
      - match_type
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      supply_id:
        min: 1
      demand_id:
        min: 1
      match_type:
        enum: ["auto", "manual", "ai_recommend", "search", "scan"]
      match_score:
        min: 0.0
        max: 100.0
      match_algorithm:
        max_length: 100
      status:
        enum: ["pending", "contacted", "negotiating", "confirmed",
               "completed", "cancelled", "expired"]
      initiator_type:
        enum: ["supply_side", "demand_side", "system", "admin"]
      contact_status:
        enum: ["not_contacted", "contacted", "meeting_scheduled",
               "meeting_done", "deal_closed", "no_response"]
      feedback_score:
        min: 1
        max: 5
      is_read:
        enum: [true, false]
    not_allowed:
      - internal_priority_score
      - blacklist_match
      - compliance_risk_score

  # --------------------------------------------------------------------------
  # visitor_logs — 访客日志表 (module_ai_card schema)
  # --------------------------------------------------------------------------
  - name: visitor_logs
    description: "访客日志 — 谁在何时查看了谁的名片"
    allowed_fields:
      - id
      - uuid
      - visitor_user_id
      - visitor_name
      - visitor_company
      - visitor_position
      - visitor_ip
      - visitor_country
      - visitor_city
      - target_user_id
      - target_card_id
      - target_organization_id
      - action_type
      - duration_seconds
      - page_viewed
      - device_type
      - browser
      - os
      - referer
      - source
      - latitude
      - longitude
      - is_favorited
      - is_followed
      - contact_requested
      - note
      - tags
      - created_at
    required:
      - uuid
      - visitor_user_id
      - target_user_id
      - action_type
    constraints:
      uuid:
        regex: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        max_length: 36
      visitor_user_id:
        min: 1
      target_user_id:
        min: 1
      action_type:
        enum: ["view", "scan_qr", "save_contact", "share", "like",
               "comment", "download", "request_contact", "follow",
               "bookmark", "report"]
      duration_seconds:
        min: 0
      device_type:
        enum: ["mobile", "tablet", "desktop", "unknown"]
      source:
        enum: ["qrcode", "link", "search", "recommendation", "scan",
               "social_share", "email", "sms", "unknown"]
      is_favorited:
        enum: [true, false]
      is_followed:
        enum: [true, false]
      contact_requested:
        enum: [true, false]
      note:
        max_length: 500
      visitor_ip:
        max_length: 45
      latitude:
        min: -90.0
        max: 90.0
      longitude:
        min: -180.0
        max: 180.0
    not_allowed:
      - exact_location
      - device_id
      - fingerprint
      - idfa
      - imei
      - ga_client_id
