[pytest]
# Test discovery - only discover digital brochure tests
# (other test files depend on main app conftest not yet created)
testpaths = tests
python_files = test_health.py test_auth.py test_brochures.py test_matching.py
python_classes = Test*
python_functions = test_*

# Output
verbose = 1
addopts =
    -v
    --tb=short
    --no-header
    --maxfail=10

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
