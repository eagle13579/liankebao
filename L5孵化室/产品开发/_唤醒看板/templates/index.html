<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪄 产品唤醒看板 | 快捷唤醒词总览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { font-family: 'Noto Sans SC', 'JetBrains Mono', sans-serif; }

        body {
            background: #0a0e17;
            min-height: 100vh;
        }

        .bg-card {
            background: linear-gradient(135deg, #111827 0%, #0f172a 100%);
            border: 1px solid rgba(56, 189, 248, 0.12);
            transition: all 0.3s ease;
        }

        .bg-card:hover {
            border-color: rgba(56, 189, 248, 0.35);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.08), 0 8px 32px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .keyword-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: #7dd3fc;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status-dot.ready { background: #34d399; box-shadow: 0 0 8px rgba(52, 211, 153, 0.5); }
        .status-dot.partial { background: #fbbf24; box-shadow: 0 0 8px rgba(251, 191, 36, 0.5); }
        .status-dot.design { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.85); }
        }

        .filter-btn {
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.25s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .filter-btn.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.4);
            color: #7dd3fc;
        }

        .filter-btn:not(.active) {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            color: #94a3b8;
        }

        .filter-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #cbd5e1;
        }

        .glow-text {
            background: linear-gradient(135deg, #7dd3fc, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cmd-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #64748b;
        }

        .stats-bar {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.08);
            border-radius: 12px;
            padding: 12px 24px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0e17; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.35); }
    </style>
</head>
<body>
    <div x-data="wakeboard()" class="max-w-7xl mx-auto px-6 py-8">
        <!-- 标题栏 -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-wide">
                    🪄 产品唤醒看板
                    <span class="text-sm font-normal text-slate-500 ml-3">| 快捷唤醒词总览</span>
                </h1>
                <p class="text-slate-500 text-sm mt-1">共 <span class="text-cyan-400 font-semibold" x-text="products.length"></span> 个产品 · 点击唤醒词可直接唤起</p>
            </div>
            <div class="text-right">
                <span class="text-slate-600 text-xs">北极星产品矩阵 · v1.0</span>
            </div>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar flex items-center gap-6 mb-6 text-sm">
            <span class="text-slate-400">就绪状态：</span>
            <span><span class="text-emerald-400 font-semibold" x-text="stats.ready"></span> <span class="text-slate-500">可运行</span></span>
            <span class="text-slate-600">|</span>
            <span><span class="text-amber-400 font-semibold" x-text="stats.partial"></span> <span class="text-slate-500">部分就绪</span></span>
            <span class="text-slate-600">|</span>
            <span><span class="text-red-400 font-semibold" x-text="stats.design"></span> <span class="text-slate-500">设计阶段</span></span>
        </div>

        <!-- 筛选过滤 -->
        <div class="flex items-center gap-3 mb-8" x-ref="filters">
            <template x-for="f in filters" :key="f.value">
                <button class="filter-btn" :class="{ 'active': currentFilter === f.value }"
                        @click="currentFilter = f.value" x-text="f.label">
                </button>
            </template>
        </div>

        <!-- 产品卡片网格 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            <template x-for="p in filteredProducts" :key="p.id">
                <div class="bg-card rounded-xl p-5 flex flex-col">
                    <!-- 产品名 + 状态 -->
                    <div class="flex items-start justify-between mb-3">
                        <h3 class="text-white font-semibold text-base leading-tight" x-text="p.name"></h3>
                        <span :class="'status-dot ' + p.status" :title="p.status_label"></span>
                    </div>

                    <!-- 快捷唤醒词 -->
                    <div class="mb-3">
                        <span class="keyword-badge" :title="'唤醒 ' + p.name">
                            ⎋ 唤醒 <span x-text="p.keyword"></span>
                        </span>
                    </div>

                    <!-- 一句话定位 -->
                    <p class="text-slate-400 text-xs leading-relaxed mb-3 flex-grow" x-text="p.tagline"></p>

                    <!-- 启动方式 -->
                    <div class="border-t border-slate-700/40 pt-3 mt-auto">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-slate-600 text-xs">🚀 启动</span>
                            <span class="text-slate-600 text-xs" x-text="p.service"></span>
                        </div>
                        <div class="cmd-text truncate" :title="p.command" x-text="p.command"></div>
                    </div>

                    <!-- 专属数字员工 -->
                    <div class="mt-2" x-show="p.digital_staff">
                        <span class="text-xs text-indigo-400/70">
                            🤖 专属数字员工：<span class="text-indigo-300" x-text="p.digital_staff"></span>
                        </span>
                    </div>
                </div>
            </template>
        </div>

        <!-- 空状态 -->
        <div x-show="filteredProducts.length === 0" class="text-center py-20 text-slate-600">
            <div class="text-5xl mb-4">📭</div>
            <p>该状态下暂无产品</p>
        </div>

        <!-- 底部 -->
        <div class="mt-12 pt-6 border-t border-slate-800/60 text-center text-slate-700 text-xs">
            <span class="glow-text font-medium">北极星产品唤醒看板</span>
            <span class="mx-2">·</span>
            <span>唤醒词直达产品 · 一目了然全貌</span>
        </div>
    </div>

    <script>
        function wakeboard() {
            return {
                products: [],
                currentFilter: 'all',
                filters: [
                    { label: '✨ 全部', value: 'all' },
                    { label: '🟢 可运行', value: 'ready' },
                    { label: '🟡 部分就绪', value: 'partial' },
                    { label: '🔴 设计阶段', value: 'design' },
                ],

                get filteredProducts() {
                    if (this.currentFilter === 'all') return this.products;
                    return this.products.filter(p => p.status === this.currentFilter);
                },

                get stats() {
                    return {
                        ready: this.products.filter(p => p.status === 'ready').length,
                        partial: this.products.filter(p => p.status === 'partial').length,
                        design: this.products.filter(p => p.status === 'design').length,
                    };
                },

                init() {
                    fetch('/api/products')
                        .then(r => r.json())
                        .then(data => { this.products = data; })
                        .catch(err => {
                            console.error('加载产品数据失败:', err);
                        });
                }
            };
        }
    </script>
</body>
</html>
