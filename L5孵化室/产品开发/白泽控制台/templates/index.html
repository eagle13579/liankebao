<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白泽控制台 v0.1 — CEO仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        baize: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            accent: '#38bdf8',
                            gold: '#f59e0b',
                            green: '#22c55e',
                            red: '#ef4444',
                            muted: '#94a3b8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* HexSpace 六边形空间 — 每个模块一个空间 (参考 multica 模式) */
        .hex-space {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.25rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .hex-space:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }
        .hex-space-title {
            color: #38bdf8;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #334155;
        }
        /* Metric card glow */
        .metric-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.25rem;
            transition: all 0.3s ease;
        }
        .metric-card:hover {
            border-color: #38bdf8;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.15);
        }
        /* Status badge glow */
        .status-online {
            color: #22c55e;
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
        }
        .status-offline {
            color: #64748b;
        }
        /* EventStream timeline pulse (参考 EventStream 模式) */
        .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #38bdf8;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        body { background: #0f172a; }
        /* Toast 容器样式 */
        .toast-fixed {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }
        .toast-item {
            pointer-events: auto;
            min-width: 280px;
            max-width: 400px;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen" x-data="baizeDashboard()" x-init="init()">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-[#0f172a]/80 backdrop-blur-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🐉</span>
                <h1 class="text-lg font-bold text-white tracking-wide">
                    白泽控制台 <span class="text-sm text-gray-500 font-normal">v0.1</span>
                </h1>
                <span class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full">CEO仪表盘</span>
            </div>
            <div class="flex items-center gap-4 text-sm text-gray-400">
                <a href="/pipeline" class="hover:text-baize-accent transition-colors flex items-center gap-1">
                    <span>⚡</span> Pipeline
                </a>
                <span class="text-gray-600">|</span>
                <span>🗼 中国软银进度</span>
                <span class="text-baize-accent font-mono">7.60%</span>
                <span class="text-gray-600">|</span>
                <span :class="loading ? 'text-yellow-400' : 'text-green-400'" x-text="loading ? '⏳ 加载中...' : '● 实时'"></span>
            </div>
        </div>
    </header>

    <!-- Toast 通知容器 (固定右下角, x-transition 动画) -->
    <div class="toast-fixed">
        <template x-for="(toast, idx) in toasts" :key="toast.id">
            <div x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-4"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-x-0"
                 x-transition:leave-end="opacity-0 translate-x-4"
                 class="toast-item rounded-lg shadow-lg border px-4 py-3 text-sm flex items-center gap-2"
                 :class="{
                     'bg-green-900/90 border-green-700 text-green-200': toast.type === 'success',
                     'bg-red-900/90 border-red-700 text-red-200': toast.type === 'error',
                     'bg-blue-900/90 border-blue-700 text-blue-200': toast.type === 'info',
                     'bg-yellow-900/90 border-yellow-700 text-yellow-200': toast.type === 'warning'
                 }">
                <span x-text="{
                    'success': '✅',
                    'error': '❌',
                    'info': 'ℹ️',
                    'warning': '⚠️'
                }[toast.type] || 'ℹ️'"></span>
                <span x-text="toast.message" class="flex-1"></span>
                <button @click="toasts = toasts.filter(t => t.id !== toast.id)"
                        class="text-current opacity-50 hover:opacity-100 ml-2">&times;</button>
            </div>
        </template>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

        <!-- ============================================================ -->
        <!-- 1. 顶部指标卡 (4个大卡片, @action 装饰器思维)                    -->
        <!-- ============================================================ -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4"
             x-transition:enter="transition ease-out duration-500"
             x-transition:enter-start="opacity-0 translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0">
            <div class="metric-card text-center">
                <div class="text-3xl font-bold text-white mb-1" x-text="stats.total_employees">--</div>
                <div class="text-xs text-gray-400 uppercase tracking-wider">👥 员工总数</div>
            </div>
            <div class="metric-card text-center">
                <div class="text-3xl font-bold text-green-400 mb-1" x-text="stats.online_employees">--</div>
                <div class="text-xs text-gray-400 uppercase tracking-wider">🟢 在线员工</div>
            </div>
            <div class="metric-card text-center">
                <div class="text-3xl font-bold text-baize-accent mb-1" x-text="stats.today_memories">--</div>
                <div class="text-xs text-gray-400 uppercase tracking-wider">📝 今日记忆</div>
            </div>
            <div class="metric-card text-center">
                <div class="text-3xl font-bold text-yellow-400 mb-1" x-text="stats.total_skills">--</div>
                <div class="text-xs text-gray-400 uppercase tracking-wider">⚡ 技能总数</div>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- 2. 员工状态表 + 3. 最近活动时间线 (两列布局)                    -->
        <!-- ============================================================ -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                <!-- 员工状态表 (左: 2/3) -->
            <div class="lg:col-span-2 hex-space"
                 x-transition:enter="transition ease-out duration-400"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100">
                <div class="hex-space-title flex items-center justify-between">
                    <span>📋 员工状态表</span>
                    <div class="flex items-center gap-3">
                        <button @click="loadSouls()" class="text-xs text-baize-accent hover:text-white transition-colors flex items-center gap-1 group relative"
                                :disabled="loadingSouls">
                            <span x-show="!loadingSouls">🫀</span>
                            <span x-show="loadingSouls" class="animate-pulse">⏳</span>
                            <span>灵魂</span>
                            <span class="ml-1 text-[10px] text-gray-500 group-hover:text-gray-300 transition-colors hidden sm:inline">点击查看性格/团队关系</span>
                        </button>
                        <div class="relative w-56">
                            <input type="text"
                                   placeholder="🔍 搜索员工姓名/角色..."
                                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-baize-accent focus:ring-1 focus:ring-baize-accent transition-all"
                                   @input.debounce.300ms="searchQuery = $event.target.value; performSearch()"
                                   x-model="searchQuery">
                            <span x-show="searchQuery && searching"
                                  class="absolute right-3 top-2 text-xs text-baize-accent animate-pulse"
                                  x-text="searchResult?.matched > 0 ? searchResult.matched : 0"></span>
                        </div>
                    </div>
                </div>
                <div x-show="searchQuery && searchResult" class="mb-2 text-xs text-baize-accent">
                    搜索结果: <span x-text="searchResult?.matched || 0"></span> 条匹配
                    (共 <span x-text="searchResult?.total || employees.length"></span> 名员工)
                    <button @click="searchQuery=''; searchResult=null" class="ml-2 text-gray-500 hover:text-white underline">清除</button>
                </div>
                <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-400 text-xs uppercase tracking-wider border-b border-gray-700">
                                    <th class="text-left py-2 pr-2 w-8"></th>
                                <th class="text-left py-2 pr-2">员工</th>
                                <th class="text-left py-2 px-2">角色</th>
                                <th class="text-center py-2 px-2">级别</th>
                                <th class="text-center py-2 px-2">记忆</th>
                                <th class="text-right py-2 pl-2">最后活动</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(emp, idx) in (searchResult ? searchResult.employees : employees)" :key="emp.id">
                                <tr class="border-b border-gray-800 hover:bg-gray-800/30 transition-colors cursor-pointer"
                                    @click="toggleEmployeeMemories(emp)"
                                    x-transition:enter="transition ease-out duration-300"
                                    x-transition:enter-start="opacity-0"
                                    x-transition:enter-end="opacity-100"
                                    :style="'transition-delay: ' + (idx % 20 * 30) + 'ms'"
                                    :class="selectedEmployee && selectedEmployee.id === emp.id ? 'bg-baize-accent/10' : ''">
                                    <td class="py-2 pr-2 text-center text-xs">
                                        <span @click.stop="toggleSoul(emp)" class="cursor-pointer hover:text-white transition-colors"
                                              x-text="soulExpanded === emp.id ? '▼' : (soulMap[emp.id] ? '⏺' : '▶')"
                                              :class="soulMap[emp.id] ? 'text-baize-accent' : 'text-gray-500'"></span>
                                    </td>
                                    <td class="py-2 pr-2 font-medium text-white text-sm">
                                        <span class="inline-block w-2 h-2 rounded-full mr-2"
                                              :class="emp.memory_count > 0 ? 'bg-green-400' : 'bg-gray-600'"></span>
                                        <span x-text="emp.name"></span>
                                    </td>
                                    <td class="py-2 px-2 text-gray-300 text-xs" x-text="roleNameMap[emp.role] || emp.role"></td>
                                    <td class="py-2 px-2 text-center">
                                        <span class="text-xs px-1.5 py-0.5 rounded bg-gray-800 text-gray-400"
                                              x-text="emp.level"></span>
                                    </td>
                                    <td class="py-2 px-2 text-center font-mono text-sm"
                                        :class="emp.memory_count > 0 ? 'text-baize-accent' : 'text-gray-600'"
                                        x-text="emp.memory_count">0</td>
                                    <td class="py-2 pl-2 text-right text-xs text-gray-500 font-mono"
                                        x-text="emp.last_active"></td>
                                </tr>
                                <!-- 灵魂详情展开行 -->
                                <tr x-show="soulExpanded === emp.id && soulMap[emp.id]"
                                    x-transition:enter="transition ease-out duration-300"
                                    x-transition:enter-start="opacity-0"
                                    x-transition:enter-end="opacity-100">
                                    <td colspan="6" class="p-0">
                                        <div class="bg-gray-800/60 border border-gray-700/50 rounded-lg mx-2 mb-2 p-4">
                                            <template x-if="soulMap[emp.id]">
                                                <div>
                                                    <!-- 身份卡 -->
                                                    <div class="flex items-center gap-3 mb-3 pb-3 border-b border-gray-700/50">
                                                        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-lg font-bold shadow-lg"
                                                             :style="'background: linear-gradient(135deg, ' + soulColors[soulMap[emp.id].soul_source]?.bg || '#334155' + ', ' + soulColors[soulMap[emp.id].soul_source]?.end || '#1e293b' + ')'"
                                                             :class="soulColors[soulMap[emp.id].soul_source]?.text || 'text-gray-300'">
                                                            <span x-text="emp.name.charAt(0)"></span>
                                                        </div>
                                                        <div class="flex-1">
                                                            <div class="flex items-center gap-2 flex-wrap">
                                                                <span class="text-white font-bold" x-text="emp.name"></span>
                                                                <span class="text-xs px-1.5 py-0.5 rounded bg-gray-700 text-gray-300" x-text="soulMap[emp.id].level"></span>
                                                                <span class="text-xs px-1.5 py-0.5 rounded"
                                                                      :class="soulColors[soulMap[emp.id].soul_source]?.badge || 'bg-purple-900/50 text-purple-300'"
                                                                      x-text="'🧬 ' + (soulMap[emp.id].soul_source || '-')"></span>
                                                            </div>
                                                            <div class="text-xs text-gray-400 mt-0.5" x-text="soulMap[emp.id].role"></div>
                                                        </div>
                                                        <button @click="soulExpanded = null" class="text-gray-500 hover:text-white text-lg leading-none">&times;</button>
                                                    </div>

                                                    <!-- 性格标签 -->
                                                    <div class="mb-3">
                                                        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1.5">🎭 性格标签</div>
                                                        <div class="flex flex-wrap gap-1.5">
                                                            <template x-for="tag in soulMap[emp.id].personality" :key="tag">
                                                                <span class="px-2 py-0.5 rounded text-xs font-medium border"
                                                                      :class="soulBadgeColor(tag)" x-text="tag"></span>
                                                            </template>
                                                            <span x-show="!soulMap[emp.id].personality || soulMap[emp.id].personality.length === 0" class="text-xs text-gray-600">暂无性格标签</span>
                                                        </div>
                                                    </div>

                                                    <!-- 核心职责 -->
                                                    <div class="mb-3">
                                                        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">🎯 核心职责</div>
                                                        <div class="text-sm text-gray-200 bg-gray-900/50 rounded px-3 py-2 border border-gray-700/30"
                                                             x-text="soulMap[emp.id].core_duty"></div>
                                                    </div>

                                                    <!-- 团队关系 -->
                                                    <div class="mb-3" x-show="soulMap[emp.id].team_relations && soulMap[emp.id].team_relations.length > 0">
                                                        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1.5">🔗 团队关系</div>
                                                        <div class="flex flex-wrap gap-2">
                                                            <template x-for="rel in soulMap[emp.id].team_relations" :key="rel.with">
                                                                <span class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded bg-gray-900/60 border border-gray-700/40 text-gray-300">
                                                                    <span class="font-medium text-baize-accent" x-text="rel.with"></span>
                                                                    <span class="text-gray-500">:</span>
                                                                    <span x-text="rel.relation"></span>
                                                                </span>
                                                            </template>
                                                        </div>
                                                    </div>

                                                    <!-- 底部统计 -->
                                                    <div class="flex items-center gap-3 pt-2 border-t border-gray-700/30 text-xs">
                                                        <span class="text-gray-400">🧠 心智模型 <strong class="text-baize-accent" x-text="soulMap[emp.id].mental_models_count || 0"></strong></span>
                                                        <span class="text-gray-600">|</span>
                                                        <span class="text-gray-400">📝 记忆 <strong class="text-green-400" x-text="soulMap[emp.id].memory_count || 0"></strong> 条</span>
                                                        <span class="text-gray-600">|</span>
                                                        <span class="text-gray-400" x-show="soulMap[emp.id].last_active && soulMap[emp.id].last_active !== '-'">⏱️ 最后活动: <span class="font-mono text-gray-300" x-text="soulMap[emp.id].last_active"></span></span>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </td>
                                </tr>
                        </tbody>
                    </table>
                </div>
                <div class="text-xs text-gray-500 mt-2 text-right">
                    <span x-text="employees.length"></span> 名员工 · 
                    在线 <span class="text-green-400" x-text="stats.online_employees"></span> · 
                    离线 <span class="text-gray-500" x-text="stats.total_employees - stats.online_employees"></span>
                </div>

                <!-- ===== 员工记忆查看抽屉 (P0-1) ===== -->
                <div x-show="selectedEmployee" x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 translate-y-2"
                     x-transition:enter-end="opacity-100 translate-y-0"
                     class="mt-4 pt-4 border-t border-gray-700">
                    <!-- 员工信息头 -->
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">🧠</span>
                            <div>
                                <span class="text-white font-bold text-base" x-text="selectedEmployee.name"></span>
                                <span class="text-gray-400 text-xs ml-2" x-text="roleNameMap[selectedEmployee.role] || selectedEmployee.role"></span>
                                <span class="text-xs px-1.5 py-0.5 rounded bg-gray-800 text-gray-400 ml-2" x-text="selectedEmployee.level"></span>
                            </div>
                        </div>
                        <button @click="selectedEmployee = null; memories = []; memoryStats = null"
                                class="text-gray-500 hover:text-white text-lg leading-none">&times;</button>
                    </div>

                    <!-- 重要性分布统计 -->
                    <div x-show="memoryStats" class="flex gap-3 mb-3 text-xs">
                        <span class="bg-red-900/30 text-red-300 px-2 py-0.5 rounded">🔴 高: <span x-text="memoryStats.high || 0"></span></span>
                        <span class="bg-yellow-900/30 text-yellow-300 px-2 py-0.5 rounded">🟡 中: <span x-text="memoryStats.medium || 0"></span></span>
                        <span class="bg-blue-900/30 text-blue-300 px-2 py-0.5 rounded">🔵 低: <span x-text="memoryStats.low || 0"></span></span>
                        <span class="text-gray-500">| 共 <span x-text="memories.length"></span> 条</span>
                    </div>

                    <!-- 记忆列表 -->
                    <div class="max-h-[300px] overflow-y-auto space-y-2 pr-1">
                        <template x-for="(mem, idx) in memories" :key="mem.id">
                            <div class="bg-gray-800/50 rounded-lg p-3 border border-gray-700 hover:border-gray-600 transition-colors">
                                <div class="flex items-start justify-between gap-2">
                                    <div class="flex-1 min-w-0">
                                        <div class="text-xs text-baize-accent font-mono mb-1" x-text="mem.type || 'general'"></div>
                                        <div class="text-sm text-gray-200 leading-relaxed" x-text="mem.summary || mem.content"></div>
                                    </div>
                                    <span class="text-xs px-1.5 py-0.5 rounded flex-shrink-0"
                                          :class="mem.importance === 'high' ? 'bg-red-900/40 text-red-300' : mem.importance === 'medium' ? 'bg-yellow-900/40 text-yellow-300' : 'bg-blue-900/40 text-blue-300'"
                                          x-text="mem.importance || 'low'"></span>
                                </div>
                                <div class="flex items-center gap-3 mt-1.5 text-xs text-gray-500">
                                    <span x-text="mem.created_at || ''"></span>
                                    <span x-show="mem.access_count !== undefined">| 访问 <span x-text="mem.access_count"></span> 次</span>
                                    <span x-show="mem.tags && mem.tags.length" class="flex gap-1 flex-wrap">
                                        <template x-for="tag in (mem.tags || []).slice(0, 5)" :key="tag">
                                            <span class="bg-gray-700 px-1.5 py-0.5 rounded text-xs text-gray-400">#<span x-text="tag"></span></span>
                                        </template>
                                    </span>
                                </div>
                            </div>
                        </template>
                        <div x-show="memories.length === 0 && !loadingMemories" class="text-center text-gray-600 py-6 text-sm">
                            📭 该员工暂无记忆
                        </div>
                        <div x-show="loadingMemories" class="text-center text-gray-500 py-6 text-sm animate-pulse">
                            ⏳ 加载记忆中...
                        </div>
                    </div>
                </div>
            </div>

            <!-- 最近活动时间线 (右: 1/3) — 已吸收 Mission Control Activity Event + 审计架构 -->
            <div class="hex-space"
                 x-transition:enter="transition ease-out duration-400"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100">
                <div class="hex-space-title flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2">
                        <span class="event-dot"></span>
                        <span>📡 活动时间线 · 审计</span>
                    </div>
                    <div class="flex items-center gap-1 text-xs">
                        <button @click="timelineView = 'flat'"
                                :class="timelineView === 'flat' ? 'bg-baize-accent/30 text-white' : 'text-gray-500 hover:text-gray-300'"
                                class="px-2 py-0.5 rounded transition-colors">列表</button>
                        <button @click="timelineView = 'grouped'"
                                :class="timelineView === 'grouped' ? 'bg-baize-accent/30 text-white' : 'text-gray-500 hover:text-gray-300'"
                                class="px-2 py-0.5 rounded transition-colors">时间线</button>
                    </div>
                </div>
                <div class="max-h-[500px] overflow-y-auto pr-1">

                    <!-- ===== 平铺列表视图 (默认) ===== -->
                    <div x-show="timelineView === 'flat'">
                        <template x-for="(act, idx) in activities" :key="act.id">
                            <div class="border-l-2 pl-3 pb-3"
                                 :class="idx === 0 ? 'border-baize-accent' : 'border-gray-700'">
                                <div class="flex items-center gap-2 text-xs text-gray-500 mb-1">
                                    <span class="font-mono" x-text="act.time"></span>

                        <span class="text-gray-500">总员工 <strong class="text-white" x-text="capabilities.total_employees || 0"></strong></span>
                    </div>
                </div>
                <div class="space-y-2 max-h-[450px] overflow-y-auto pr-1">
                    <template x-for="(role, idx) in capabilities.roles" :key="role.role">
                        <div class="bg-gray-800/40 rounded-lg border border-gray-700/50 overflow-hidden">
                            <div @click="toggleCapabilityRole(role.role)"
                                 class="flex items-center justify-between p-3 cursor-pointer hover:bg-gray-700/30 transition-colors">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-gray-500" x-text="expandedCapRole === role.role ? '▼' : '▶'"></span>
                                    <span class="text-sm font-medium text-gray-200" x-text="roleNameMap[role.role] || role.role"></span>
                                    <span class="text-xs bg-gray-700 px-1.5 py-0.5 rounded text-gray-400" x-text="role.count + '人'"></span>
                                    <span class="text-xs text-baize-accent" x-text="role.skill_count + '技能'"></span>
                                </div>
                            </div>
                            <div x-show="expandedCapRole === role.role"
                                 x-transition:enter="transition ease-out duration-200"
                                 x-transition:enter-start="opacity-0"
                                 x-transition:enter-end="opacity-100"
                                 class="px-3 pb-3">
                                <div class="flex flex-wrap gap-1.5">
                                    <template x-for="skill in role.skills" :key="skill">
                                        <span class="bg-gray-700/50 px-2 py-0.5 rounded text-xs text-gray-300 border border-gray-600/50">#<span x-text="skill"></span></span>
                                    </template>
                                    <span x-show="!role.skills || role.skills.length === 0" class="text-xs text-gray-600">暂无技能</span>
                                </div>
                            </div>
                        </div>
                    </template>
                    <div x-show="!capabilities.roles || capabilities.roles.length === 0" class="text-center text-gray-600 py-8 text-sm">
                        📭 暂无能力数据
                    </div>
                </div>
            </div>

            <!-- 组织架构树 (P2) -->
            <div class="hex-space">
                <div class="hex-space-title flex items-center justify-between">
                    <span>🏗️ 组织架构树</span>
                    <div class="flex items-center gap-2 text-xs">
                        <span class="text-gray-500">角色 <strong class="text-white" x-text="organization.total_roles || 0"></strong></span>
                        <span class="text-gray-600">·</span>
                        <span class="text-gray-500">员工 <strong class="text-white" x-text="organization.total_employees || 0"></strong></span>
                    </div>
                </div>
                <div class="max-h-[450px] overflow-y-auto pr-1 space-y-1">
                    <template x-for="node in organization.tree" :key="node.name">
                        <div>
                            <!-- Role node (level 1) -->
                            <div class="flex items-center gap-2 py-1.5 cursor-pointer hover:bg-gray-800/30 rounded px-2 transition-colors"
                                 @click="toggleOrgNode(node.name)">
                                <span class="text-sm text-yellow-400">🏰</span>
                                <span class="text-sm font-bold text-white" x-text="node.name"></span>
                                <span class="text-xs text-gray-500" x-text="'(' + node.count + '人)'"></span>
                                <span class="text-xs text-gray-600" x-text="orgExpanded[node.name] ? '▼' : '▶'"></span>
                            </div>
                            <!-- Employees (level 2) -->
                            <div x-show="orgExpanded[node.name]"
                                 x-transition:enter="transition ease-out duration-200"
                                 x-transition:enter-start="opacity-0"
                                 x-transition:enter-end="opacity-100"
                                 class="ml-6 space-y-0.5 border-l border-gray-700 pl-3">
                                <template x-for="empNode in (node.children || [])" :key="empNode.name">
                                    <div class="flex items-center gap-2 py-0.5 px-2 hover:bg-gray-800/20 rounded transition-colors">
                                        <span class="inline-block w-2 h-2 rounded-full"
                                              :class="empNode.status === 'online' ? 'bg-green-400' : 'bg-gray-600'"></span>
                                        <span class="text-xs text-gray-300" x-text="empNode.name"></span>
                                        <span class="text-xs text-gray-600" x-text="empNode.status === 'online' ? '在线' : '离线'"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                    <div x-show="!organization.tree || organization.tree.length === 0" class="text-center text-gray-600 py-8 text-sm">
                        📭 暂无组织架构数据
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-xs text-gray-600 pt-4 border-t border-gray-800">
            白泽控制台 v0.1 · 数据从文件系统和SQLite实时读取
        </footer>

    </main>

    <script>
        // ================================================================
        // 白泽控制台 — Alpine.js 前端状态管理 (HexSpace 六边形空间模式)
        // 参考 multica 六边形空间: 每个模块独立管理状态
        // ================================================================
        function baizeDashboard() {
            return {
                // --- 状态空间 (HexSpace) ---
                loading: true,
                toasts: [],
                stats: {
                    total_employees: 0,
                    online_employees: 0,
                    today_memories: 0,
                    total_skills: 0,
                },
                employees: [],
                activities: [],
                timeline: [],
                timelineView: 'flat',
                system: {
                    windows: [],
                    latest_decision: '',
                },
                tokenCosts: {
                    daily: { call_count: 0, total_tokens: 0, cost_yuan: 0, prompt_tokens: 0, completion_tokens: 0 },
                    monthly: { call_count: 0, total_tokens: 0, cost_yuan: 0, prompt_tokens: 0, completion_tokens: 0 },
                    profiles: [],
                    limits: {},
                    dailyPct: 0,
                    monthlyPct: 0,
                    maxProfileTokens: 0,
                },

                products: [],
                productsLoaded: false,

                // --- 中英映射表 (来自 flask-alpine-admin-panel skill) ---
                roleNameMap: {
                    'strategist': '策略师',
                    'analyst': '分析师',
                    'risk-analyst': '风险分析师',
                    'research-analyst': '研究分析师',
                    'data-engineer': '数据工程师',
                    'data-compliance-officer': '数据合规官',
                    'compliance-officer': '合规官',
                    'chief-compliance-officer': '首席合规官',
                    'ip-compliance-officer': '知识产权合规官',
                    'labor-compliance-officer': '劳动合规官',
                    'legal-counsel': '法律顾问',
                    'backend-engineer': '后端工程师',
                    'biz-dev-manager': '商务拓展经理',
                    'sales-manager': '销售经理',
                    'market-developer': '市场拓展',
                    'marketer': '市场专员',
                    'growth-hacker': '增长黑客',
                    'content-creator': '内容创作者',
                    'copywriter': '文案',
                    'designer': '设计师',
                    'cmo': '首席营销官',
                    'cto': '首席技术官',
                    'operator': '运营专员',
                    'operations-manager': '运营经理',
                    'coordinator': '协调员',
                    'innovator': '创新官',
                    'researcher': '研究员',
                    'personal-assistant': '个人助理',
                    'intelligence-officer': '情报官',
                    'chief-tax-officer': '首席税务官',
                    'visa-immigration-officer': '签证移民官',
                    'windows-ops': 'Windows运维',
                    'product-manager': '产品经理',
                    'meeting-analyst': '会议分析师',
                },

                // --- Toast 通知方法 ---
                showToast(message, type) {
                    const id = Date.now() + Math.random().toString(36).slice(2, 6);
                    this.toasts.push({ id, message, type: type || 'info' });
                    // 3秒后自动移除
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 3000);
                },

                // --- 初始化: 加载所有数据 (x-init) ---
                async init() {
                    this.loading = true;
                    await Promise.all([
                        this.loadStats(),
                        this.loadEmployees(),
                        this.loadActivities(),
                        this.loadTimeline(),
                        this.loadSystem(),
                        this.loadDecisionBoard(),
                        this.loadTokenCosts(),
                        this.loadHeartbeat(),
                        this.loadCapabilities(),
                        this.loadOrganization(),
                        this.loadProducts(),
                    ]);
                    this.loading = false;

                    // 自动刷新: 每30秒
                    setInterval(() => this.refresh(), 30000);
                },

                async refresh() {
                    await Promise.all([
                        this.loadStats(),
                        this.loadEmployees(),
                        this.loadActivities(),
                        this.loadTimeline(),
                        this.loadSystem(),
                        this.loadDecisionBoard(),
                        this.loadTokenCosts(),
                        this.loadHeartbeat(),
                        this.loadCapabilities(),
                        this.loadOrganization(),
                        this.loadProducts(),
                    ]);
                },

                async loadStats() {
                    try {
                        const res = await fetch('/api/stats');
                        this.stats = await res.json();
                    } catch (e) {
                        console.error('Stats load failed:', e);
                    }
                },

                async loadEmployees() {
                    try {
                        const res = await fetch('/api/employees');
                        const data = await res.json();
                        this.employees = data.employees || [];
                    } catch (e) {
                        console.error('Employees load failed:', e);
                    }
                },

                async loadActivities() {
                    try {
                        const res = await fetch('/api/activities');
                        const data = await res.json();
                        this.activities = data.activities || [];
                    } catch (e) {
                        console.error('Activities load failed:', e);
                    }
                },

                async loadTimeline() {
                    try {
                        const res = await fetch('/api/activities/timeline');
                        const data = await res.json();
                        this.timeline = data.timeline || [];
                    } catch (e) {
                        console.error('Timeline load failed:', e);
                    }
                },

                async approveActivity(act) {
                    try {
                        const res = await fetch('/api/activities/approve/' + encodeURIComponent(act.id), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ reason: '', operator: 'baize-console' })
                        });
                        const data = await res.json();
                        if (data.success) {
                            act.audit_status = 'confirmed';
                            act.can_approve = false;
                            this.showToast('✓ 审批通过：' + (act.summary || '').substring(0, 40), 'success');
                            console.log('[Audit] Approved:', act.id, act.summary, data);
                        } else {
                            this.showToast('❌ 审批失败: ' + (data.error || '未知错误'), 'error');
                        }
                    } catch (e) {
                        this.showToast('❌ 审批请求失败: ' + e.message, 'error');
                        console.error('[Audit] Approve failed:', e);
                    }
                },

                async rejectActivity(act) {
                    try {
                        const res = await fetch('/api/activities/reject/' + encodeURIComponent(act.id), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ reason: '', operator: 'baize-console' })
                        });
                        const data = await res.json();
                        if (data.success) {
                            act.audit_status = 'rejected';
                            act.can_approve = false;
                            this.showToast('✗ 已驳回：' + (act.summary || '').substring(0, 40), 'error');
                            console.log('[Audit] Rejected:', act.id, act.summary, data);
                        } else {
                            this.showToast('❌ 驳回失败: ' + (data.error || '未知错误'), 'error');
                        }
                    } catch (e) {
                        this.showToast('❌ 驳回请求失败: ' + e.message, 'error');
                        console.error('[Audit] Reject failed:', e);
                    }
                },

                // --- 员工记忆查看 (P0-1) ---
                selectedEmployee: null,
                memories: [],
                memoryStats: null,
                loadingMemories: false,

                // --- 心跳监控 (P0-2) ---
                heartbeats: [],
                heartbeatStats: { online_active: 0, offline: 0, evolution_enabled: 0, avg_activity: 0 },

                // --- 灵魂数据 ---
                soulMap: {},
                soulExpanded: null,
                loadingSouls: false,
                soulColors: {
                    'linus-torvalds': { bg: '#dc2626', end: '#991b1b', text: 'text-white', badge: 'bg-red-900/50 text-red-300' },
                    'linus-torvalds-perspective': { bg: '#dc2626', end: '#991b1b', text: 'text-white', badge: 'bg-red-900/50 text-red-300' },
                    'steve-jobs': { bg: '#d97706', end: '#92400e', text: 'text-white', badge: 'bg-amber-900/50 text-amber-300' },
                    'elon-musk': { bg: '#2563eb', end: '#1e3a5f', text: 'text-white', badge: 'bg-blue-900/50 text-blue-300' },
                    'yann-lecun': { bg: '#7c3aed', end: '#4c1d95', text: 'text-white', badge: 'bg-purple-900/50 text-purple-300' },
                    'andrej-karpathy': { bg: '#059669', end: '#065f46', text: 'text-white', badge: 'bg-emerald-900/50 text-emerald-300' },
                    'paul-graham': { bg: '#0891b2', end: '#155e75', text: 'text-white', badge: 'bg-cyan-900/50 text-cyan-300' },
                    'default': { bg: '#4b5563', end: '#1f2937', text: 'text-gray-300', badge: 'bg-gray-700 text-gray-400' },
                },

                // --- 能力诊断 (P1) ---
                capabilities: { roles: [], total_roles: 0, total_skills: 0, total_employees: 0 },
                expandedCapRole: null,

                // --- 组织架构 (P2) ---
                organization: { tree: [], total_roles: 0, total_employees: 0 },
                orgExpanded: {},

                searchQuery: '',
                searchResult: null,
                searching: false, // BUG-1 FIXED: 添加searching变量定义
                selectedEmployee: null,
                showDecision: false,
                decisionContent: '',
                loadingDecision: false,

                async loadDecisionBoard() {
                    try {
                        const res = await fetch('/api/decision_board');
                        const data = await res.json();
                        if (data.exists) {
                            this.decisionContent = data.content;
                        }
                    } catch (e) {
                        console.error('DecisionBoard load failed:', e);
                    }
                },

                async toggleDecisionBoard() {
                    if (this.showDecision) {
                        this.showDecision = false;
                        return;
                    }
                    // 缓存逻辑: 如果已有内容直接显示，不重新fetch
                    if (this.decisionContent) {
                        this.showDecision = true;
                        return;
                    }
                    this.showDecision = true;
                    this.loadingDecision = true;
                    try {
                        const res = await fetch('/api/decision_board');
                        const data = await res.json();
                        if (data.exists) {
                            this.decisionContent = data.content;
                        } else {
                            this.decisionContent = '⚠️ 决策板文件不存在';
                        }
                    } catch (e) {
                        this.decisionContent = '❌ 加载失败: ' + e.message;
                    } finally {
                        this.loadingDecision = false;
                    }
                },

                async performSearch() {
                    const q = this.searchQuery.trim();
                    if (!q) {
                        this.searchResult = null;
                        return;
                    }
                    try {
                        const res = await fetch('/api/search_employee?q=' + encodeURIComponent(q));
                        this.searchResult = await res.json();
                    } catch (e) {
                        console.error('Search failed:', e);
                    }
                },

                // --- 员工记忆查看方法 (P0-1) ---
                async toggleEmployeeMemories(emp) {
                    if (this.selectedEmployee && this.selectedEmployee.id === emp.id) {
                        this.selectedEmployee = null;
                        this.memories = [];
                        this.memoryStats = null;
                        return;
                    }
                    this.selectedEmployee = emp;
                    this.loadingMemories = true;
                    this.memories = [];
                    this.memoryStats = null;
                    try {
                        const res = await fetch('/api/employees/' + emp.id + '/memories?limit=30');
                        const data = await res.json();
                        this.memories = data.memories || [];
                        this.memoryStats = data.importance_stats || null;
                        if (data.total > 0) {
                            this.showToast('🧠 已加载 ' + emp.name + ' 的 ' + data.total + ' 条记忆', 'info');
                        }
                    } catch (e) {
                        console.error('Memories load failed:', e);
                        this.showToast('❌ 记忆加载失败: ' + e.message, 'error');
                    } finally {
                        this.loadingMemories = false;
                    }
                },

                // --- 心跳监控方法 (P0-2) ---
                async loadHeartbeat() {
                    try {
                        const res = await fetch('/api/employees/heartbeat');
                        const data = await res.json();
                        this.heartbeats = data.heartbeats || [];
                        // 按活跃度降序排列
                        this.heartbeats.sort((a, b) => (b.activity_score || 0) - (a.activity_score || 0));
                        // 计算统计
                        const total = this.heartbeats.length;
                        const online = this.heartbeats.filter(h => h.status === 'online').length;
                        const offline = total - online;
                        const evoOn = this.heartbeats.filter(h => h.evolution_enabled).length;
                        const avgAct = total > 0 ? this.heartbeats.reduce((s, h) => s + (h.activity_score || 0), 0) / total : 0;
                        this.heartbeatStats = {
                            online_active: online,
                            offline: offline,
                            evolution_enabled: evoOn,
                            avg_activity: avgAct,
                        };
                    } catch (e) {
                        console.error('Heartbeat load failed:', e);
                    }
                },

                // --- 灵魂数据方法 ---
                async loadSouls() {
                    if (this.loadingSouls) return;
                    this.loadingSouls = true;
                    try {
                        const res = await fetch('/api/v2/employees/souls');
                        const data = await res.json();
                        const souls = data.souls || [];
                        const map = {};
                        souls.forEach(s => { map[s.id] = s; });
                        this.soulMap = map;
                        this.showToast('🫀 已加载 ' + souls.length + ' 名员工的灵魂信息', 'success');
                    } catch (e) {
                        console.error('Souls load failed:', e);
                        this.showToast('❌ 灵魂数据加载失败: ' + e.message, 'error');
                    } finally {
                        this.loadingSouls = false;
                    }
                },

                soulBadgeColor(tag) {
                    const colors = [
                        'bg-blue-900/50 text-blue-300 border-blue-700/30',
                        'bg-green-900/50 text-green-300 border-green-700/30',
                        'bg-red-900/50 text-red-300 border-red-700/30',
                        'bg-yellow-900/50 text-yellow-300 border-yellow-700/30',
                        'bg-purple-900/50 text-purple-300 border-purple-700/30',
                        'bg-pink-900/50 text-pink-300 border-pink-700/30',
                        'bg-indigo-900/50 text-indigo-300 border-indigo-700/30',
                        'bg-teal-900/50 text-teal-300 border-teal-700/30',
                        'bg-orange-900/50 text-orange-300 border-orange-700/30',
                        'bg-cyan-900/50 text-cyan-300 border-cyan-700/30',
                    ];
                    const hash = tag.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
                    return colors[hash % colors.length];
                },

                toggleSoul(emp) {
                    if (this.soulExpanded === emp.id) {
                        this.soulExpanded = null;
                        return;
                    }
                    if (!this.soulMap[emp.id]) {
                        this.showToast('💡 请先点击 "灵魂" 按钮加载灵魂数据', 'info');
                        return;
                    }
                    this.soulExpanded = emp.id;
                },

                // --- 能力诊断方法 (P1) ---
                async loadCapabilities() {
                    try {
                        const res = await fetch('/api/capabilities');
                        const data = await res.json();
                        this.capabilities = data || { roles: [], total_roles: 0, total_skills: 0, total_employees: 0 };
                    } catch (e) {
                        console.error('Capabilities load failed:', e);
                    }
                },

                toggleCapabilityRole(role) {
                    this.expandedCapRole = this.expandedCapRole === role ? null : role;
                },

                // --- 组织架构方法 (P2) ---
                async loadOrganization() {
                    try {
                        const res = await fetch('/api/organization');
                        const data = await res.json();
                        this.organization = data || { tree: [], total_roles: 0, total_employees: 0 };
                        // 默认展开根节点
                        if (this.organization.tree && this.organization.tree.length > 0) {
                            this.organization.tree.forEach(node => {
                                this.orgExpanded[node.name] = true;
                            });
                        }
                    } catch (e) {
                        console.error('Organization load failed:', e);
                    }
                },

                toggleOrgNode(key) {
                    this.orgExpanded[key] = !this.orgExpanded[key];
                },

                async loadSystem() {
                    try {
                        const res = await fetch('/api/system');
                        this.system = await res.json();
                    } catch (e) {
                        console.error('System load failed:', e);
                    }
                },

                async loadTokenCosts() {
                    try {
                        const res = await fetch('/api/token_costs');
                        const data = await res.json();
                        this.tokenCosts.daily = data.daily || { call_count: 0, total_tokens: 0, cost_yuan: 0, prompt_tokens: 0, completion_tokens: 0 };
                        this.tokenCosts.monthly = data.monthly || { call_count: 0, total_tokens: 0, cost_yuan: 0, prompt_tokens: 0, completion_tokens: 0 };
                        this.tokenCosts.profiles = data.profiles || [];
                        this.tokenCosts.limits = data.limits || {};
                        // 计算百分比
                        const dLimit = data.limits?.daily_token_limit || 50000;
                        const mLimit = data.limits?.monthly_token_limit || 1000000;
                        this.tokenCosts.dailyPct = dLimit > 0 ? Math.min(100, ((data.daily?.total_tokens || 0) / dLimit * 100)).toFixed(1) : 0;
                        this.tokenCosts.monthlyPct = mLimit > 0 ? Math.min(100, ((data.monthly?.total_tokens || 0) / mLimit * 100)).toFixed(1) : 0;
                        // 计算最大profile token值用于相对进度条
                        const profiles = (data && data.profiles) || [];
                        this.tokenCosts.maxProfileTokens = Math.max(...profiles.map(p => p.total_tokens || 0), 1);
                    } catch (e) {
                        console.error('TokenCosts load failed:', e);
                    }
                },

                loadProducts() {
                    fetch('/api/products')
                        .then(r => r.json())
                        .then(data => { this.products = data; this.productsLoaded = true; })
                        .catch(e => console.error('Products load failed:', e));
                },
            }
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- 产品唤醒看板 -->

                <span class="text-xs text-gray-500" x-text="'共 ' + products.length + ' 个产品 | 点击唤醒词自动加载上下文'"></span>

                <template x-for="p in products" :key="p.id">
                    <div class="bg-gray-800/50 rounded-lg p-3 border border-gray-700 hover:border-baize-accent transition-all duration-200 hover:shadow-lg hover:shadow-baize-accent/5 group">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-baize-accent bg-baize-accent/10 px-2 py-0.5 rounded" x-text="'⎋ ' + p.keyword"></span>
                            <span class="text-xs text-gray-500" x-text="p.staff || ''"></span>
                        </div>
                        <div class="text-sm font-semibold text-white mb-1" x-text="p.name"></div>
                        <div class="text-xs text-gray-400 mb-2 line-clamp-2" x-text="p.tagline"></div>
                        <div class="text-xs text-gray-500 flex items-center gap-2">
                            <span class="inline-block w-2 h-2 rounded-full bg-green-500" x-show="p.status=='ready'"></span>
                            <span x-text="p.service"></span>
                        </div>
                        <div class="mt-2 pt-2 border-t border-gray-700/50">
                            <code class="text-[10px] text-gray-500 block truncate" x-text="'$ ' + p.command"></code>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</body>
</html>
