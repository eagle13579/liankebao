<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI数字名片</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/static/sw.js').then(reg => {
                console.log('[PWA] SW registered:', reg.scope);
            }).catch(err => {
                console.warn('[PWA] SW registration failed:', err);
            });
        });
    }
    </script>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(160deg, #0f0c29 0%, #302b63 40%, #24243e 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
        }
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px 24px; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            width: 100%;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1); color: #c0c0c0;
            border: 1px solid rgba(255,255,255,0.15); padding: 12px 24px; border-radius: 12px;
            font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.3s;
            width: 100%;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.18); }
        .input-field {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; padding: 14px 16px; color: white; font-size: 15px;
            width: 100%; outline: none; transition: all 0.3s;
        }
        .input-field:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .input-field::placeholder { color: rgba(255,255,255,0.35); }
        .auth-container {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%; max-width: 400px; padding: 36px 28px;
        }
        .logo-text {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #667eea, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; margin-bottom: 4px;
        }
        .sub-text { text-align: center; color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 32px; }
        .switch-link { color: #a78bfa; cursor: pointer; font-size: 14px; text-align: center; margin-top: 20px; }
        .switch-link:hover { color: #c4b5fd; }
        .error-msg { color: #f87171; font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px; padding: 16px;
        }
        .brochure-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 20px; transition: all 0.3s; cursor: pointer;
        }
        .brochure-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; color: white;
        }
        .empty-state {
            text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4);
        }
        .empty-state svg { width: 64px; height: 64px; margin: 0 auto 16px; opacity: 0.3; }
    </style>
</head>
<body>
<div x-data="app()" class="min-h-screen">
    <!-- ====== 登录/注册界面 ====== -->
    <template x-if="!isLoggedIn">
        <div class="auth-container">
            <div class="auth-card glass-card">
                <div class="logo-text">AI数字名片</div>
                <div class="sub-text">链客宝 · 企业家智能商务厅</div>

                <!-- 登录表单 -->
                <template x-if="showLogin">
                    <form @submit.prevent="handleLogin">
                        <input type="tel" x-model="loginPhone" placeholder="手机号" class="input-field mb-3" required>
                        <input type="password" x-model="loginPassword" placeholder="密码" class="input-field mb-4" required>
                        <button type="submit" class="btn-primary" x-text="loading ? '登录中...' : '登录'"></button>
                        <div class="error-msg" x-text="errorMsg"></div>
                        <div class="switch-link" @click="showLogin=false; errorMsg=''">没有账号？去注册</div>
                    </form>
                </template>

                <!-- 注册表单 -->
                <template x-if="!showLogin">
                    <form @submit.prevent="handleRegister">
                        <input type="text" x-model="registerName" placeholder="姓名" class="input-field mb-3" required>
                        <input type="tel" x-model="registerPhone" placeholder="手机号" class="input-field mb-3" required>
                        <input type="password" x-model="registerPassword" placeholder="密码（至少6位）" class="input-field mb-4" required>
                        <button type="submit" class="btn-primary" x-text="loading ? '注册中...' : '注册'"></button>
                        <div class="error-msg" x-text="errorMsg"></div>
                        <div class="switch-link" @click="showLogin=true; errorMsg=''">已有账号？去登录</div>
                    </form>
                </template>
            </div>
        </div>
    </template>

    <!-- ====== 画册管理界面（已登录） ====== -->
    <template x-if="isLoggedIn">
        <div>
            <!-- 顶部栏 -->
            <div class="top-bar glass-card" style="margin:12px;border-radius:12px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="user-avatar" x-text="(user?.name||'?')[0]"></div>
                    <div>
                        <div style="font-weight:600;font-size:15px;" x-text="user?.name||'用户'"></div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.4);" x-text="user?.phone||''"></div>
                    </div>
                </div>
                <div style="display:flex;gap:8px;">
                    <button @click="createNew" class="btn-primary" style="width:auto;padding:8px 16px;font-size:13px;">+ 新建名片</button>
                    <button @click="handleLogout" class="btn-secondary" style="width:auto;padding:8px 16px;font-size:13px;">退出</button>
                </div>
            </div>

            <!-- 画册列表 -->
            <div style="padding:0 12px;">
                <!-- 加载中 -->
                <div x-show="loading" class="empty-state">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <p>加载中...</p>
                </div>

                <!-- 空状态 -->
                <div x-show="!loading && brochures.length === 0" class="empty-state">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    <p style="font-size:18px;font-weight:600;margin-bottom:8px;">还没有数字名片</p>
                    <p style="font-size:14px;margin-bottom:24px;">创建你的第一张AI数字名片，开启商业连接</p>
                    <button @click="createNew" class="btn-primary" style="width:auto;padding:12px 32px;">创建我的名片</button>
                </div>

                <!-- 画册卡片网格 -->
                <div x-show="!loading && brochures.length > 0" class="card-grid">
                    <template x-for="b in brochures" :key="b.id">
                        <div class="brochure-card">
                            <div style="font-size:18px;font-weight:600;margin-bottom:4px;" x-text="b.profile?.name||b.name||'未命名'"></div>
                            <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px;" x-text="b.company?.name||b.company||''"></div>
                            <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:14px;">
                                <span x-text="b.updated_at ? '更新: ' + b.updated_at.slice(0,10) : ''"></span>
                            </div>
                            <div style="display:flex;gap:8px;">
                                <button @click="editBrochure(b.id)" class="btn-secondary" style="width:auto;padding:6px 14px;font-size:12px;">编辑</button>
                                <button @click="previewBrochure(b.id)" class="btn-secondary" style="width:auto;padding:6px 14px;font-size:12px;">预览</button>
                                <button @click="shareBrochure(b)" class="btn-secondary" style="width:auto;padding:6px 14px;font-size:12px;">分享</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function app() {
    return {
        // 登录/注册状态
        token: localStorage.getItem('token') || '',
        user: null,
        isLoggedIn: false,
        showLogin: true,
        loading: false,
        loginPhone: '',
        loginPassword: '',
        registerName: '',
        registerPhone: '',
        registerPassword: '',
        errorMsg: '',
        brochures: [],

        async init() {
            if (this.token) {
                await this.verifyToken();
            }
        },

        async verifyToken() {
            try {
                const resp = await fetch('/api/v1/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.code === 0) {
                        this.user = data.user || data;
                        this.isLoggedIn = true;
                        await this.loadBrochures();
                        return;
                    }
                }
                // Token无效
                localStorage.removeItem('token');
                this.token = '';
                this.isLoggedIn = false;
            } catch(e) {
                console.error('验证失败:', e);
                localStorage.removeItem('token');
                this.token = '';
            }
        },

        async handleLogin() {
            this.loading = true;
            this.errorMsg = '';
            try {
                const resp = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: this.loginPhone, password: this.loginPassword })
                });
                const data = await resp.json();
                if (data.access_token) {
                    this.token = data.access_token;
                    this.user = data.user || data;
                    localStorage.setItem('token', this.token);
                    this.isLoggedIn = true;
                    this.loginPhone = '';
                    this.loginPassword = '';
                    await this.loadBrochures();
                } else {
                    this.errorMsg = data.message || '登录失败，请检查账号密码';
                }
            } catch(e) {
                this.errorMsg = '网络错误，请重试';
            } finally {
                this.loading = false;
            }
        },

        async handleRegister() {
            if (this.registerPassword.length < 6) {
                this.errorMsg = '密码至少6位';
                return;
            }
            this.loading = true;
            this.errorMsg = '';
            try {
                const resp = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: this.registerName,
                        phone: this.registerPhone,
                        password: this.registerPassword
                    })
                });
                const data = await resp.json();
                if (data.access_token) {
                    this.token = data.access_token;
                    this.user = data.user || data;
                    localStorage.setItem('token', this.token);
                    this.isLoggedIn = true;
                    this.registerName = '';
                    this.registerPhone = '';
                    this.registerPassword = '';
                    await this.loadBrochures();
                } else {
                    this.errorMsg = data.message || '注册失败，请重试';
                }
            } catch(e) {
                this.errorMsg = '网络错误，请重试';
            } finally {
                this.loading = false;
            }
        },

        async loadBrochures() {
            this.loading = true;
            try {
                const resp = await fetch('/api/v1/brochure/list', {
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                if (resp.status === 401) {
                    this.handleLogout();
                    return;
                }
                const data = await resp.json();
                if (data.code === 0) {
                    this.brochures = data.data?.items || [];
                }
            } catch(e) {
                console.error('加载画册失败:', e);
            } finally {
                this.loading = false;
            }
        },

        handleLogout() {
            // 尝试调退出API
            fetch('/api/v1/auth/logout', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + this.token }
            }).catch(() => {});
            localStorage.removeItem('token');
            this.token = '';
            this.isLoggedIn = false;
            this.user = null;
            this.brochures = [];
        },

        createNew() {
            window.location.href = '/brochure_editor.html';
        },

        editBrochure(id) {
            window.location.href = '/brochure_editor.html?id=' + id;
        },

        previewBrochure(id) {
            window.open('/api/v1/brochures/' + encodeURIComponent(id) + '/brochure', '_blank');
        },

        shareBrochure(b) {
            const url = window.location.origin + '/api/v1/brochures/' + encodeURIComponent(b.id) + '/brochure';
            if (navigator.share) {
                navigator.share({ title: '我的数字名片', url: url }).catch(() => {});
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    this.errorMsg = '链接已复制';
                    setTimeout(() => this.errorMsg = '', 2000);
                }).catch(() => {});
            }
        }
    }
}
</script>
</body>
</html>
