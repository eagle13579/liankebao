# ============================================================
# Nginx 反向代理配置 — Matomo 自建部署
# 放置路径: /etc/nginx/conf.d/matomo.conf  (或 sites-available)
# 适用环境: 阿里云/腾讯云 ECS, CentOS 7+ / Ubuntu 20.04+
# ============================================================

upstream matomo_backend {
    server 127.0.0.1:8080;   # Matomo 容器映射端口（见 docker-compose.yml）
    keepalive 32;
}

server {
    listen 80;
    server_name matomo.你的域名.com;      # ← 必改: 替换为你的域名
    return 301 https://$host$request_uri;  # HTTP → HTTPS 强制跳转
}

server {
    listen 443 ssl http2;
    server_name matomo.你的域名.com;      # ← 必改: 替换为你的域名

    # ========== SSL 证书路径（请替换为实际路径） ==========
    ssl_certificate     /etc/nginx/ssl/你的域名.com/fullchain.pem;   # ← 必改
    ssl_certificate_key /etc/nginx/ssl/你的域名.com/privkey.pem;     # ← 必改

    # ========== SSL 安全配置 ==========
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS (可启用)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ========== 安全头部 ==========
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== 访问限制（二选一或同时使用） ==========

    ## 方案A: IP 白名单（推荐：仅允许公司出口IP或特定IP段）
    # allow 114.114.114.114;          # ← 替换为实际 IP
    # allow 192.168.0.0/16;           # 内网网段
    # deny all;

    ## 方案B: HTTP Basic Auth（适合多用户管理后台访问）
    # auth_basic "Matomo Admin Area";
    # auth_basic_user_file /etc/nginx/.htpasswd;  # 用 htpasswd 创建

    # ========== 客户端限制 ==========
    client_max_body_size 64M;          # Matomo 导出/上传文件大小限制
    client_body_buffer_size 128k;

    # ========== 反向代理 ==========
    location / {
        proxy_pass http://matomo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（Matomo 热力图/会话录制用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        send_timeout          60s;

        # 缓存禁用（统计分析需要实时数据）
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ========== 静态资源缓存 ==========
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://matomo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 静态资源可缓存
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========== 日志 ==========
    access_log /var/log/nginx/matomo_access.log main;
    error_log  /var/log/nginx/matomo_error.log warn;
}
