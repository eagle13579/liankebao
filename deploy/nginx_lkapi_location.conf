# =============================================================================
# 链客宝小程序 API 路由 — /lkapi/ 反向代理配置
# 插入位置：go-aiport.com 的 nginx server 块内
# 作用：将 https://www.go-aiport.com/lkapi/* 代理到后端 FastAPI (localhost:8000)
#       同时将路径前缀 /lkapi 重写为 /api（后端实际路由前缀）
# =============================================================================
# 使用方式：
#   1. 找到 go-aiport.com 的 server 块（通常在 /etc/nginx/sites-enabled/ 下）
#   2. 在 server 块内最后一个 } 之前插入此配置段
#   3. 执行 nginx -t 测试配置
#   4. 执行 nginx -s reload 生效
# =============================================================================

    location /lkapi/ {
        # 路径重写：移除 /lkapi 前缀，保留剩余路径
        # 例如：/lkapi/user/login → /api/user/login
        rewrite ^/lkapi(/.*)$ $1 break;

        # 反向代理到本地后端 FastAPI 服务
        proxy_pass http://127.0.0.1:8000;

        # 传递原始 Host 头
        proxy_set_header Host $host;

        # 传递客户端真实 IP
        proxy_set_header X-Real-IP $remote_addr;

        # 传递客户端 IP 链（用于后端日志/审计）
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 传递请求协议（http/https）
        proxy_set_header X-Forwarded-Proto $scheme;

        # 可选：超时设置（根据后端响应速度调整）
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # 可选：禁止 Nginx 缓存代理响应
        proxy_buffering off;
    }
