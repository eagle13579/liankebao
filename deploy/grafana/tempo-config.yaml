# Tempo 配置 — 链客宝AI分布式追踪后端
# 接收 OTLP gRPC + HTTP 协议数据
server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

overrides:
  max_bytes_per_trace: 5_000_000  # 5MB per trace

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: chainke-local
  storage:
    path: /tmp/tempo/generated_metrics
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
