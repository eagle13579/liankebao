# ============================================================
# 链客宝AI Grafana — Prometheus 数据源配置
# ============================================================
# 自动置入 Grafana，路径:
#   /etc/grafana/provisioning/datasources/prometheus.yml
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"
      httpMethod: "POST"
