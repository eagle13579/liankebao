# ============================================================
# 链客宝 Nginx 配置
# 服务器: 阿里云 ECS (47.100.160.250)
# 域名: liankebao.top / www.liankebao.top
# 前端: Vite + React (静态文件 /dist)
# 后端: FastAPI + Uvicorn (localhost:8000)
# ============================================================

# 全局配置
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 事件配置
events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

# HTTP 配置
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml;

    # 文件上传大小限制
    client_max_body_size 50M;

    # HTTPS 全局配置（由 Certbot 管理）
    # 证书路径: /etc/letsencrypt/live/liankebao.top/

    # ============================================================
    # HTTP -> HTTPS 重定向
    # ============================================================
    server {
        listen 80;
        listen [::]:80;
        server_name liankebao.top www.liankebao.top;

        # Let's Encrypt 验证（certbot 自动管理）
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # 所有 HTTP 请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS 服务器（主站点）
    # ============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name liankebao.top www.liankebao.top;

        # ===================== SSL 配置 =====================
        ssl_certificate     /etc/letsencrypt/live/liankebao.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/liankebao.top/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/liankebao.top/chain.pem;

        # SSL 协议和加密套件
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL 会话缓存
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ===================== 安全头 =====================
        # XSS 保护
        add_header X-XSS-Protection "1; mode=block" always;
        # 防止 MIME 类型嗅探
        add_header X-Content-Type-Options "nosniff" always;
        # 点击劫持保护
        add_header X-Frame-Options "SAMEORIGIN" always;
        # 内容安全策略
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.weixin.qq.com; frame-src 'self'; object-src 'none'; base-uri 'self';" always;
        # 引用来源策略
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # 权限策略
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # ===================== 根路径 - 前端静态文件 =====================
        root /opt/liankebao/dist;
        index index.html;

        # 前端静态文件服务
        location / {
            try_files $uri $uri/ /index.html;

            # 静态文件缓存
            location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot|css|js)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ===================== API 反向代理 =====================
        # FastAPI 后端 Uvicorn 服务 (localhost:8000)
        # API 路由: /auth, /products, /orders, /promoter, /health
        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # 关闭后端错误页面
            proxy_intercept_errors off;
        }

        # 兼容无 /api 前缀的后端路由（直接代理）
        location ~ ^/(auth|products|orders|promoter|admin|health|docs|openapi|redoc) {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===================== 静态资源目录（备用） =====================
        location /static/ {
            alias /opt/liankebao/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ===================== 健康检查 =====================
        location /health {
            access_log off;
            proxy_pass http://127.0.0.1:8000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ===================== 错误页面 =====================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
