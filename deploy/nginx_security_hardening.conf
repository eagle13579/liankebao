# ============================================================
# 链客宝 Nginx 安全加固配置 — WAF + IP白名单 + Rate Limit
# ============================================================
# 引入位置: http 块末尾 (nginx.conf 中 http { ... include ...; })
# 引入命令: include /etc/nginx/nginx_security_hardening.conf;
#
# 配合已有: deploy/nginx_security.conf (SSL/CORS/基础安全头)
# ============================================================

# ---- 1. 请求体大小限制 ----
# API 接口限制 1MB (防止大 payload 攻击)
client_max_body_size 1M;

# ---- 2. WAF 规则: SQL 注入拦截 ----
# 拒绝 URI 中包含常见 SQL 注入模式的请求
# 覆盖: UNION, SELECT...FROM, INSERT, DROP, SLEEP 等
map $request_uri $is_sql_injection {
    default 0;
    "~*(union.*select|select.*from|insert.*into|update.*set|delete.*from|drop.*table|alter.*table|create.*table|truncate.*table|load_file|into.*outfile|into.*dumpfile|\bor\b.*=.*\b1\b\s*$|or.*1=1--|or.*1=1#|or.*1=1%23|sleep\s*\(|benchmark\s*\(|pg_sleep|waitfor|delay\s*\()" 1;
    "~*(exec\s*\(|execute\s*\(|xp_cmdshell|sp_executesql|information_schema|sys\.objects|sys\.tables|sys\.columns|@@version|user_name\s*\(|current_user\s*\()" 1;
}

# ---- 3. WAF 规则: XSS 拦截 ----
# 拒绝 URI 中包含常见 XSS 载荷的请求
map $request_uri $is_xss_attack {
    default 0;
    "~*(<script|javascript:|onerror\s*=|onload\s*=|onclick\s*=|onmouseover\s*=|onfocus\s*=|onblur\s*=|onchange\s*=|onsubmit\s*=|onreset\s*=|onselect\s*=|onabort\s*=)" 1;
    "~*(alert\s*\(|confirm\s*\(|prompt\s*\(|document\.cookie|document\.write|window\.location|eval\s*\(|fromCharCode|String\.fromCharCode)" 1;
    "~*(<img\s+.*src|%3Cscript|%3Cimg|%3Ciframe|%3Csvg|%3Cbody|%3Cinput)" 1;
    "~*(expression\s*\(|url\s*\(|data\s*:.*base64|vbscript:|livescript:)" 1;
}

# ---- 4. 请求方法限制 ----
# /api/* 仅允许 GET/POST/PUT/DELETE/PATCH
map $request_method $is_invalid_method {
    default 1;
    GET      0;
    POST     0;
    PUT      0;
    DELETE   0;
    PATCH    0;
}

# ---- 5. IP 白名单 ----
# /api/admin/* 仅允许内网 + 指定 IP
# 可以在 server 或 location 块中通过 geo 指令引用
geo $admin_allow {
    default 0;
    # 内网 CIDR
    10.0.0.0/8    1;
    172.16.0.0/12 1;
    192.168.0.0/16 1;
    127.0.0.0/8   1;
    # 阿里云内网 (ECS 专属网络)
    100.64.0.0/10 1;
    # 指定公网 IP (替换为实际管理 IP)
    # 47.100.160.250 1;
}

# ---- 6. 速率限制 (Nginx 级别) ----
# 6a. 全局: 每 IP 每秒 10 个请求
limit_req_zone $binary_remote_addr zone=global_req:10m rate=10r/s;

# 6b. API 接口: 每 IP 每分钟 60 个请求 (配合 FastAPI 层)
limit_req_zone $binary_remote_addr zone=api_req:10m rate=60r/m;

# 6c. 认证接口 (登录/注册): 每 IP 每分钟 5 个请求
limit_req_zone $binary_remote_addr zone=auth_req:10m rate=5r/m;

# 6d. 管理后台: 每 IP 每分钟 10 个请求
limit_req_zone $binary_remote_addr zone=admin_req:10m rate=10r/m;

# 6e. 敏感操作 (支付/提现/密码重置): 每 IP 每小时 6 个请求
limit_req_zone $binary_remote_addr zone=sensitive_req:10m rate=6r/h;

# 6f. 并发连接数限制: 每 IP 最多 30 个并发连接
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ---- 7. 请求头/体缓冲区防护 ----
client_body_buffer_size 128k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;
client_body_timeout 12s;
client_header_timeout 10s;
reset_timedout_connection on;
send_timeout 10s;

# ---- 8. 隐藏 Nginx 版本号 ----
server_tokens off;

# ---- 9. HTTP/2 加固 ----
http2_max_field_size 4k;
http2_max_header_size 8k;
http2_max_requests 1000;

# ---- 10. 连接池优化 ----
keepalive_timeout 15s;
keepalive_requests 100;

