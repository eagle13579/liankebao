# ============================================================
# 链客宝 Nginx 配置 — Docker 环境
# 适用于 docker-compose 中的 frontend 服务
# ============================================================

# 以非 root 用户运行（安全最佳实践）
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    access_log /dev/stdout main;  # Docker 日志输出

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml;

    # 文件上传大小限制
    client_max_body_size 50M;

    # ============================================================
    # 服务器配置
    # ============================================================
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ===================== 根路径 - 前端静态文件 =====================
        root /usr/share/nginx/html;
        index index.html;

        # 前端 SPA 路由（所有非 API 请求返回 index.html）
        location / {
            try_files $uri $uri/ /app/index.html;

            # 静态文件缓存（30 天）
            location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot|css|js)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ===================== 名片分享页 SEO Meta 代理 =====================
        location ~ ^/app/card/(.+)$ {
            proxy_pass http://meta-proxy:3002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            proxy_buffering off;
        }

        # ===================== API 反向代理 =====================
        # 后端服务地址（docker-compose 中 service 名为 backend）
        location /api/ {
            proxy_pass http://backend:8001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # 兼容无 /api 前缀的路由（直接代理到后端）
        location ~ ^/(auth|products|orders|promoter|admin|health|docs|openapi|redoc) {
            proxy_pass http://backend:8001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===================== 健康检查 =====================
        location /health {
            access_log off;
            proxy_pass http://backend:8001/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ===================== 错误页面 =====================
        error_page 404 /app/index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
