# ============================================================
# 链客宝 蓝绿部署 Nginx 配置
# 服务器: 阿里云 ECS (47.100.160.250)
# 域名: liankebao.top / www.liankebao.top
# 前端: Vite + React (静态文件)
# 后端: FastAPI + Uvicorn (蓝绿双目录)
# 
# 蓝绿部署说明:
#   Blue:  /opt/liankebao-blue/  端口 18001
#   Green: /opt/liankebao-green/ 端口 18002
#   活跃后端由 blue-green-deploy.sh 控制，通过生成
#   /etc/nginx/conf.d/chainke-active-backend.conf 文件切换
#
# 部署方式:
#   sudo cp deploy/nginx-bluegreen.conf /etc/nginx/nginx.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# 全局配置
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 事件配置
events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

# HTTP 配置
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml;

    # 文件上传大小限制
    client_max_body_size 50M;

    # ============================================================
    # 蓝绿部署 Upstream 定义
    # 活跃后端由 blue-green-deploy.sh 动态切换
    # 该文件由脚本生成: /etc/nginx/conf.d/chainke-active-backend.conf
    # ============================================================
    upstream backend {
        # 健康检查端点（由 blue-green-deploy.sh 执行，非 nginx 原生）
        # 活跃后端 —— 由脚本动态生成该文件内容
        include /etc/nginx/conf.d/chainke-active-backend.conf;

        # 备用: 如果上述文件不存在，默认指向 blue
        server 127.0.0.1:18001;
    }

    # ============================================================
    # HTTP -> HTTPS 重定向
    # ============================================================
    server {
        listen 80;
        listen [::]:80;
        server_name liankebao.top www.liankebao.top;

        # Let's Encrypt 验证（certbot 自动管理）
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # 所有 HTTP 请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS 服务器（主站点）
    # ============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name liankebao.top www.liankebao.top;

        # ===================== SSL 配置 =====================
        ssl_certificate     /etc/letsencrypt/live/liankebao.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/liankebao.top/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/liankebao.top/chain.pem;

        # SSL 协议和加密套件
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL 会话缓存
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ===================== 安全头 =====================
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.weixin.qq.com; frame-src 'self'; object-src 'none'; base-uri 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # ===================== 根路径 - 前端静态文件 =====================
        # 在前端代码不变时，两个目录的 dist 是一致的
        # 使用 symlink 由脚本管理，指向当前活跃目录的 dist/
        root /opt/liankebao/dist.active;
        index index.html;

        # 前端静态文件服务（SPA 回退）
        location / {
            try_files $uri $uri/ /index.html;

            # 静态文件缓存
            location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot|css|js)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ===================== 名片分享页 SEO Meta 代理 =====================
        location ~ ^/app/card/(.+)$ {
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            proxy_buffering off;
        }

        # ===================== API 反向代理（通过 upstream） =====================
        # FastAPI 后端 Uvicorn 服务 — 自动指向当前活跃环境
        location /api/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            proxy_intercept_errors off;
        }

        # 兼容无 /api 前缀的后端路由（通过 upstream）
        location ~ ^/(auth|products|orders|promoter|admin|health|docs|openapi|redoc) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===================== 静态资源目录（备用） =====================
        location /static/ {
            alias /opt/liankebao/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ===================== 健康检查端点（内部） =====================
        # 部署脚本通过该端点检查后端健康状态
        location /health {
            access_log off;
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ===================== 蓝绿部署状态端点（可选） =====================
        # 返回当前活跃环境信息，供运维工具查看
        location /deploy/status {
            access_log off;
            default_type application/json;
            return 200 '{"service":"liankebao","deploy_mode":"blue-green","active_backend":"unknown"}';
        }

        # ===================== 错误页面 =====================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
