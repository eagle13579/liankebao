# ============================================================
# 链客宝 Nginx 安全加固配置
# 建议引入位置：在 http 块末尾或 server 块中 include
# include /etc/nginx/nginx_security.conf;
# ============================================================

# ---- 1. 请求体大小限制 ----
# 防止大请求体攻击，API 接口限 1MB
client_max_body_size 1M;

# ---- 2. 速率限制 ----
# 基于 IP 的速率限制，每 IP 每秒最多 10 个请求
# 使用时在 location 块中引用：limit_req zone=per_ip burst=20 nodelay;
limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;

# ---- 3. SSL 协议优化（仅安全版本）----
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ---- 4. SSL Stapling ----
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# ---- 5. HSTS（HTTP Strict Transport Security）----
# 强制浏览器始终通过 HTTPS 访问，有效期 1 年，包含所有子域名
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ---- 6. 点击劫持防护 ----
add_header X-Frame-Options "DENY" always;

# ---- 7. MIME 类型嗅探防护 ----
add_header X-Content-Type-Options "nosniff" always;

# ---- 8. 内容安全策略（CSP）----
# 限制资源加载来源，防止 XSS 和数据注入
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;

# ---- 9. 引用来源策略 ----
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---- 10. 权限策略 ----
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# ---- 11. 禁止访问敏感文件 ----
location ~* \.(db|sqlite|sqlite3|env|pyc|pyo|log|swp|bak|old)$ {
    deny all;
    return 404;
}

location ~ /\.git {
    deny all;
    return 404;
}

location ~ /\.env {
    deny all;
    return 404;
}

location ~ /vendor/ {
    deny all;
    return 404;
}

location ~ /node_modules/ {
    deny all;
    return 404;
}

# ---- 12. 隐藏 Nginx 版本号 ----
server_tokens off;
