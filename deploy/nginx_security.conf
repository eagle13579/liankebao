# ============================================================
# 链客宝 Nginx 安全加固配置（增强版）
# 服务器: 阿里云 ECS (47.100.160.250)
# 域名: liankebao.top / www.liankebao.top
# 引入位置：在 http 块末尾（nginx.conf 中 http { ... include ...; }）
# 引入命令：include /etc/nginx/nginx_security.conf;
# ============================================================

# ---- 1. 请求体大小限制 ----
# 防止大请求体攻击，API 接口限 1MB
client_max_body_size 1M;

# ---- 2. 速率限制（全局 + API 精细化）----
#
# 2a. 全局 IP 限速：每 IP 每秒最多 10 个请求
limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;

# 2b. API 接口限速：每 IP 每分钟最多 30 个请求（比全局更严格）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# 2c. 认证接口限速：登录/注册/验证码，每 IP 每分钟最多 5 个请求（防暴力破解）
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# 2d. 管理后台接口限速：每 IP 每分钟最多 10 个请求
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/m;

# 2e. 敏感操作限速：密码重置、支付等，每 IP 每小时最多 6 个请求
limit_req_zone $binary_remote_addr zone=sensitive_limit:10m rate=6r/h;

# ---- 3. SSL 协议优化（仅安全版本）----
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ---- 4. SSL Stapling（OCSP 装订）----
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# ---- 5. HSTS（HTTP Strict Transport Security）----
# 注：若 server 块中已有此头，nginx 会使用 server 块的值覆盖本设置
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ---- 6. 安全响应头（全局默认值）----
# 注：server 块中若有同名 add_header，会完全覆盖本段所有 add_header
#      因此若 server 块自定义了安全头，请确保覆盖所有需要的项

# 6a. 点击劫持防护
add_header X-Frame-Options "DENY" always;

# 6b. MIME 类型嗅探防护
add_header X-Content-Type-Options "nosniff" always;

# 6c. XSS 保护（旧浏览器兼容）
add_header X-XSS-Protection "1; mode=block" always;

# 6d. 引用来源策略
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 6e. 权限策略（限制浏览器 API 访问）
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)" always;

# 6f. 内容安全策略（CSP）— 全局宽松默认
# 如果应用有特殊连接需求（如微信 API），请在 server 块中覆盖
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

# ---- 7. 敏感路径和目录封禁（全局应用于所有 server 块）----

# 7a. 版本控制系统目录
location ~ /\.(git|svn|hg|bzr|cvs) {
    deny all;
    return 404;
}

# 7b. 环境/配置文件
location ~ /\.(env|env\.example|env\.local|env\.production|env\.development) {
    deny all;
    return 404;
}

location ~* /(\.env|env|config|backup|sql|dump|export|import|migrations|seeds) {
    deny all;
    return 404;
}

# 7c. 管理后台（WordPress 及其他常见 CMS）
location ~* /(wp-admin|wp-content|wp-includes|wp-json|xmlrpc\.php) {
    deny all;
    return 404;
}

# 7d. API 文档（生产环境必须禁用）
# 注意：如果 FastAPI 的 /docs /redoc /openapi.json 在后端代理后，请在 nginx.conf
#       的对应 location 上使用专门的 deny 或限制 IP，而非在此全局封禁
location ~* /(api-docs|swagger|swagger\.json|swagger\.yaml) {
    deny all;
    return 404;
}

# 7e. 调试/开发路径
location ~* /(phpmyadmin|pma|adminer|console|debug|test|dev|_debug|_dev|phpinfo\.php) {
    deny all;
    return 404;
}

# 7f. 通用敏感路径模式（覆盖常见的后台/安装/配置路径）
# 注：/admin、/docs、/system 等路径请勿在此全局封禁，它们在链客宝后端有实际路由
#     如需限制，请在对应 server 块中使用 allow/deny 或 IP 白名单
location ~* /(manager|management|dashboard|setup|install|upload|uploads|download|downloads|cgi-bin|bin|tmp|temp|log|logs|cache|caches|data|datas|private|secret|internal) {
    deny all;
    return 404;
}

# 7g. 敏感文件扩展名（数据库、密钥、配置、备份、缓存）
location ~* \.(db|sqlite|sqlite3|sql|mdb|accdb|env|pyc|pyo|log|swp|bak|old|conf|cfg|ini|yml|yaml|toml|pem|key|crt|csr|cer|p12|pfx|jks|keystore|rdp|ssh|pub|gpg|asc|ds_store|htaccess|htpasswd|gitignore|dockerignore|editorconfig|lock|dist|local|example|sample)$ {
    deny all;
    return 404;
}

# 7h. 依赖和构建目录
location ~* /(vendor|node_modules|bower_components|composer|packages|runtime|storage|build|dist|\.next|\.nuxt|target|out|output) {
    deny all;
    return 404;
}

# ---- 8. SQL 注入拦截（基础正则防护）----
# 注意：此为第一道防线，真实生产环境强烈建议配合 WAF（ModSecurity / NAXSI / 云盾）
# 拒绝包含常见 SQL 注入关键字的 URI
location ~* (union.*select|select.*from|insert.*into|update.*set|delete.*from|drop.*table|alter.*table|create.*table|truncate.*table|load_file|into.*outfile|into.*dumpfile|or.*1=1|or.*1=1--|or.*1=1#|or.*1=1%23|sleep\(|benchmark\(|pg_sleep|waitfor|delay) {
    deny all;
    return 403;
}

# ---- 9. 请求方法限制 ----
# 使用 map 在 http 块级别定义允许的方法检查
# 在 server/location 块中可以通过 if 或 geo 来引用
# 此处提供参考配置——实际应在 server 块内按需使用：
#   if ($invalid_method) { return 405; }

# ---- 10. 恶意 User-Agent 拦截 ----
# 常见恶意爬虫、扫描器、漏洞探测工具
location ~* (curl|wget|scrapy|python-requests|python-urllib|go-http-client|java/|libwww-perl|perl|ruby|php|nikto|masscan|sqlmap|nmap|acunetix|nessus|openvas|nessus|hydra|medusa|thc|zmeu|zgrab|gobuster|dirbuster|wfuzz|burpsuite|fiddler|postmanruntime|jmeter|aiohttp|httpx|httprobe|feroxbuster|ffuf) {
    deny all;
    return 403;
}

# ---- 11. 隐藏 Nginx 版本号 ----
server_tokens off;

# ---- 12. 请求头/体缓冲区溢出防护 ----
client_body_buffer_size 128k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;
client_body_timeout 12s;
client_header_timeout 10s;

# ---- 13. 防止 Host 头攻击（按需启用）----
# 取消注释以下内容启用 Host 头校验
# map $http_host $is_valid_host {
#     default 0;
#     "~^(liankebao\.top|www\.liankebao\.top|localhost|127\.0\.0\.1)$" 1;
# }
# server {
#     if ($is_valid_host = 0) {
#         return 444;
#     }
# }

# ---- 14. HTTP/2 协议加固 ----
# HTTP/2 连接设置
http2_max_field_size 4k;
http2_max_header_size 8k;
http2_max_requests 1000;

# ---- 15. 连接超时 ----
# 减少空闲连接等待时间，防止资源耗尽
reset_timedout_connection on;
send_timeout 10s;
keepalive_timeout 15s;
keepalive_requests 100;
