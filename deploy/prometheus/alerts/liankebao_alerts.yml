# ============================================================
# 链客宝AI Prometheus 告警规则
# ============================================================
# 由 prometheus.yml 的 rule_files 加载
# ============================================================

groups:
  - name: liankebao_alerts
    interval: 15s
    rules:

      # -------------------------------------------------------
      # ① 健康看板离线
      # -------------------------------------------------------
      - alert: ChainKeMetricsUnreachable
        expr: up{job="liankebao-health"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "健康看板离线 (job={{ $labels.job }})"
          description: "Prometheus 已连续5分钟无法抓取 {{ $labels.job }}/{{ $labels.instance }} 指标"

      # -------------------------------------------------------
      # ② 后端 API 不可用
      # -------------------------------------------------------
      - alert: ChainKeApiDown
        expr: liankebao_api_up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "后端 API 不可用"
          description: "FastAPI 后端连续5分钟返回非正常状态 (instance={{ $labels.instance }})"

      # -------------------------------------------------------
      # ③ 数据库不可用
      # -------------------------------------------------------
      - alert: ChainKeDbDown
        expr: liankebao_db_up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "数据库不可用"
          description: "数据库连续5分钟响应异常 (instance={{ $labels.instance }})"

      # -------------------------------------------------------
      # ④ 服务整体宕机
      # -------------------------------------------------------
      - alert: ChainKeServiceDown
        expr: liankebao_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "链客宝AI服务整体宕机"
          description: "核心服务不可用，需立即处理"

      # -------------------------------------------------------
      # ⑤ 高延迟 (FastAPI 的 P95 响应时间 > 3s)
      #     需要 FastAPI 暴露 /metrics 且包含
      #     http_request_duration_seconds 直方图指标
      # -------------------------------------------------------
      - alert: ChainKeHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="liankebao-api"}[5m])) by (le)
          ) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API 高延迟 (P95 > 3s)"
          description: "API 响应时间 P95 超过 3 秒 (当前 {{ $value | humanizeDuration }})"
