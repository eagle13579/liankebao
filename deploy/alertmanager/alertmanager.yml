# ============================================================
# 链客宝AI Alertmanager 配置
# ============================================================
# 告警路由、抑制、通知渠道
# ============================================================

global:
  # 告警解决后自动发送 resolved 通知
  resolve_timeout: 5m
  # 企业微信 Webhook (需替换为实际 URL)
  # wechat_api_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"

route:
  group_by: ["alertname", "job", "severity"]
  # 同一组告警等待 10s 后发送（可聚合更多告警）
  group_wait: 10s
  # 同一组告警至少间隔 5m 重复发送
  group_interval: 5m
  # 重复发送间隔
  repeat_interval: 4h
  # 默认接收器
  receiver: "webhook-default"

  # 子路由 — 按严重级别分发
  routes:
    # 严重告警 → 企业微信 + 电话 (示例)
    - match:
        severity: critical
      receiver: "webhook-critical"
      continue: true

    # 警告级别 → 默认 webhook
    - match:
        severity: warning
      receiver: "webhook-default"

# ============================================================
# 接收器
# ============================================================
receivers:
  # 默认 Webhook (通用告警通知)
  - name: "webhook-default"
    webhook_configs:
      - url: "http://webhook:5000/alert"
        send_resolved: true
        http_config:
          timeout: 10s

  # 严重告警 Webhook （高优先级通道）
  - name: "webhook-critical"
    webhook_configs:
      - url: "http://webhook:5000/alert/critical"
        send_resolved: true
        http_config:
          timeout: 10s

# ============================================================
# 抑制规则 — 防止告警风暴
# ============================================================
inhibit_rules:
  # 如果整体服务已 down，抑制该服务的子组件告警
  - source_matchers:
      - alertname = "ChainKeServiceDown"
    target_matchers:
      - alertname = "ChainKeApiDown"
      - alertname = "ChainKeDbDown"
    equal: ["instance"]

  # metrics 不可达时抑制所有派生告警
  - source_matchers:
      - alertname = "ChainKeMetricsUnreachable"
    target_matchers:
      - alertname = "ChainKeApiDown"
      - alertname = "ChainKeDbDown"
      - alertname = "ChainKeHighLatency"
    equal: ["instance", "job"]

