# =============================================================================
# Grafana 仪表盘配置 — 自动加载链客宝监控仪表盘
# =============================================================================
apiVersion: 1

providers:
  - name: "Chainke Dashboards"
    orgId: 1
    folder: "链客宝"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
