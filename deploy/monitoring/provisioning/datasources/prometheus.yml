# =============================================================================
# Grafana 数据源配置 — 自动添加 Prometheus 数据源
# =============================================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
