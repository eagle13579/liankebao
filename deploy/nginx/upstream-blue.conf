# =============================================================================
# 链客宝 — Nginx Upstream (蓝色环境)
# 被 chainke.conf 通过 include /etc/nginx/upstream-active.conf 引用
# 蓝绿部署时，由 deploy/blue_green_deploy.sh 切换符号链接
# =============================================================================
upstream chainke-backend {
    # 蓝色后端容器 (docker-compose.blue.yml 定义)
    server backend-blue:8001  max_fails=3  fail_timeout=10s;
    keepalive 32;
}
