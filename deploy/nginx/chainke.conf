# =============================================================================
# 链客宝 (chainke-full) — Nginx 生产配置
# =============================================================================
# 功能:
#   1. SPA 路由回退（React Router）
#   2. hreflang 多语言支持（HTTP Link header）
#   3. 静态资源缓存策略（content hash 文件长期缓存）
#   4. Gzip 压缩
#   5. SSL/TLS 配置（建议 + HTTP→HTTPS 跳转）
#   6. 安全头（CSP, HSTS, X-Frame-Options 等）
#   7. API 反向代理 → FastAPI (8001)
#
# 使用方式:
#   - 直接作为 nginx 主配置: cp deploy/nginx/chainke.conf /etc/nginx/nginx.conf
#   - 或作为 site 引入: 软链到 /etc/nginx/sites-enabled/
# =============================================================================

# ── 全局 ─────────────────────────────────────────────────────────────────────
events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    # ── 基础 ──────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main  buffer=32k  flush=5s;
    error_log   /var/log/nginx/error.log   warn;

    # 基础优化
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;               # 隐藏 nginx 版本号

    # 文件上传大小（匹配后端限制）
    client_max_body_size 50M;

    # ── Gzip 压缩 ─────────────────────────────────────────────────────────
    gzip                on;
    gzip_comp_level     5;
    gzip_min_length     256;
    gzip_proxied        any;
    gzip_vary           on;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/manifest+json
        application/ld+json
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;
    gzip_disable "msie6";

    # ── 爬虫检测 (用于预渲染 SEO) ──────────────────────────────────────────
    # 匹配常见搜索引擎/社交爬虫 User-Agent, 命中后尝试返回预渲染静态 HTML
    map $http_user_agent $is_bot {
        default 0;
        ~*(googlebot|bingbot|baiduspider|yandexbot|facebookexternalhit|twitterbot|
           rogerbot|linkedinbot|embedly|quora|pinterest|slack|vkshare|
           w3c_validator|whatsapp|applebot|semrushbot|ahrefsbot|dotbot|
           mj12bot|pingdom|petalbot|duckduckbot|slurp|archive\.org|
           ia_archiver|grapeshot|seznambot|sogou) 1;
    }

    # ── Accept-Language 自动检测 ──────────────────────────────────────────
    # 用于根路径 / 的重定向判断: 检测浏览器首选语言
    # ko → 跳转 /ko/ ; en → 跳转 /en/ ; 其他 → 保持默认中文
    map $http_accept_language $accept_lang_redirect {
        default       "";
        ~*^ko         "ko";
        ~*^en         "en";
    }

    # ── Brotli 压缩（如果编译了 Brotli 模块，取消注释） ─────────────────
    #brotli             on;
    #brotli_comp_level   6;
    #brotli_min_length   256;
    #brotli_types
    #    text/plain
    #    text/css
    #    text/xml
    #    text/javascript
    #    application/json
    #    application/javascript
    #    application/xml
    #    application/xml+rss
    #    image/svg+xml
    #    image/x-icon
    #    font/woff
    #    font/woff2;

    # ── 上游后端 (蓝绿部署) ──────────────────────────────────────────────
    # 实际内容由 blue_green_deploy.sh 切换 (upstream-blue.conf / upstream-green.conf)
    # 部署脚本会将选中的 upstream 配置复制为 upstream-active.conf
    include /etc/nginx/upstream-active.conf;

    # ── Puppeteer 动态预渲染服务上游 ──────────────────────────────────────
    # 用于爬虫请求的动态 SSR 渲染 fallback (当静态预渲染文件不存在时)
    # 部署在 Docker Compose 中作为独立服务 (backend/scripts/prerender_server.py)
    # 如果不需要动态预渲染或服务未部署，注释掉此 upstream 即可自动禁用
    upstream chainke-prerender {
        # 预渲染服务: Python FastAPI 基于 pyppeteer (Puppeteer Python 移植)
        server prerender:3001  max_fails=3  fail_timeout=30s;
        keepalive 8;
    }

    # ═════════════════════════════════════════════════════════════════════
    # HTTPS 服务器（生产推荐）
    # ═════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name liankebao.top www.liankebao.top;

        # ── SSL 证书 ─── 请替换为实际证书路径 ──────────────────────────
        ssl_certificate     /etc/nginx/ssl/liankebao.top.pem;
        ssl_certificate_key /etc/nginx/ssl/liankebao.top.key;

        # ── SSL 协议与加密套件（安全优先） ──────────────────────────────
        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  on;
        ssl_session_cache          shared:SSL:50m;
        ssl_session_timeout        1d;
        ssl_session_tickets        off;

        # ── OCSP Stapling ───────────────────────────────────────────────
        ssl_stapling            on;
        ssl_stapling_verify     on;
        resolver                8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout        5s;

        # ── HSTS（强制 HTTPS） ──────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── 前端 SPA ─────────────────────────────────────────────────────
        # 构建产物目录（Vite 构建后输出到 deploy/docker/dist/，
        # 在容器内挂载或复制到 /app/frontend）
        root   /app/frontend;
        index  index.html;

        # ── 安全头（Security Headers） ──────────────────────────────────
        # Content Security Policy (CSP) — 根据实际需要调整
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval';
            style-src  'self' 'unsafe-inline';
            img-src    'self' data: blob: https:;
            font-src   'self' data:;
            connect-src 'self' https://api.liankebao.top wss://api.liankebao.top;
            media-src  'self';
            object-src 'none';
            frame-src  'self';
            base-uri   'self';
            form-action 'self';
            manifest-src 'self';
        " always;

        add_header X-Frame-Options          "SAMEORIGIN"  always;
        add_header X-Content-Type-Options   "nosniff"     always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        # ── hreflang 多语言支持 ─────────────────────────────────────────
        # 使用 HTTP Link header 方式（Google 官方支持）
        # 支持: zh-CN / en / ko / x-default
        #
        # 架构: 子路径方式 (/en/xxx, /ko/xxx)
        #   前端 react-router 已支持 /en/、/ko/ 等路径前缀
        #
        # 语言检测
        map $uri $lang {
            ~^/en/    "en";
            ~^/ko/    "ko";
            default   "zh-CN";
        }
        map $uri $lang_path {
            ~^/en/(.*)  "/$1";
            ~^/ko/(.*)  "/$1";
            default     $uri;
        }

        # Canonical URL (always use current URL without language prefix for zh-CN)
        set $canonical_url "$scheme://$host$request_uri";
        add_header Link '<$canonical_url>; rel="canonical"';

        # x-default 指向主站（中文站）
        add_header Link '<$scheme://$host$uri>; rel="alternate"; hreflang="x-default"';

        # 各语言版本
        add_header Link '<$scheme://$host$uri>; rel="alternate"; hreflang="zh-CN"';
        add_header Link '<$scheme://$host/en$lang_path>; rel="alternate"; hreflang="en"';
        add_header Link '<$scheme://$host/ko$lang_path>; rel="alternate"; hreflang="ko"';

        # ── 多语言扩展指南（取消注释并按需修改） ──────────────────────
        # 方案 A: 子路径方式 (/en/xxx, /ja/xxx)
        #   需要前端配合 react-router 支持 /en/、/ja/ 等路径前缀
        #   然后在 nginx 中用 map 或 if 判断路径前缀:
        #
        #   map $uri $lang {
        #       ~^/en/    "en";
        #       ~^/ja/    "ja";
        #       default   "zh-CN";
        #   }
        #   map $uri $lang_path {
        #       ~^/en/(.*)  "/$1";
        #       ~^/ja/(.*)  "/$1";
        #       default     $uri;
        #   }
        #
        #   然后在 location / 中设置:
        #   add_header Link '<$scheme://$host/en$lang_path>; rel="alternate"; hreflang="en"';
        #   add_header Link '<$scheme://$host/ja$lang_path>; rel="alternate"; hreflang="ja"';
        #
        # 方案 B: 子域名方式 (en.liankebao.top)
        #   为每个语言子域名创建独立的 server block，
        #   每个 block 内设置对应的 hreflang header 并互相引用。

        # ── 多语言 URL 前缀 ───────────────────────────────────────────────
        # /en/* 剥离前缀后 proxy 到后端，传递 X-Lang-Prefix 头供后端识别语言
        location ^~ /en/ {
            rewrite ^/en/(.*) /$1 break;
            proxy_pass http://chainke-backend;
            proxy_set_header X-Lang-Prefix "en";
            proxy_http_version 1.1;
            proxy_set_header Host                  $host;
            proxy_set_header X-Real-IP             $remote_addr;
            proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto     $scheme;
            proxy_set_header Upgrade               $http_upgrade;
            proxy_set_header Connection            "upgrade";
            proxy_connect_timeout    60s;
            proxy_read_timeout       120s;
            proxy_send_timeout       60s;
        }

        location ^~ /ko/ {
            rewrite ^/ko/(.*) /$1 break;
            proxy_pass http://chainke-backend;
            proxy_set_header X-Lang-Prefix "ko";
            proxy_http_version 1.1;
            proxy_set_header Host                  $host;
            proxy_set_header X-Real-IP             $remote_addr;
            proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto     $scheme;
            proxy_set_header Upgrade               $http_upgrade;
            proxy_set_header Connection            "upgrade";
            proxy_connect_timeout    60s;
            proxy_read_timeout       120s;
            proxy_send_timeout       60s;
        }

        # ── SPA 路由回退 ────────────────────────────────────────────────
        # 去掉末尾斜杠（排除语言前缀路径 /en/ /ko/）
        location ~ ^/(?!en/|ko/)(.+)/$ {
            return 301 $scheme://$host/$1;
        }

        # ── 主路由 ──────────────────────────────────────────────────────
        # 策略:
        #   1. Accept-Language 检测 → 非中文浏览器首次访问根路径时重定向
        #   2. 爬虫 → 优先返回预渲染静态 HTML (prerendered/ 目录)
        #   3. 爬虫 + 静态文件不存在 → 代理到 Puppeteer 动态预渲染服务
        #   4. 普通用户 → 正常 SPA 流程
        #   5. 动态预渲染服务不可用时 → 回退到 SPA index.html
        location / {
            # Accept-Language 自动检测重定向
            # 检测浏览器首选语言，若为韩语/英语且当前请求无语言前缀，
            # 将语言前缀附加到原路径前重定向 (如 /pricing → /ko/pricing)
            if ($accept_lang_redirect != "") {
                return 302 /$accept_lang_redirect$request_uri;
            }
            # 爬虫: 尝试返回预渲染 HTML (优先级: 静态文件 > 动态渲染 > SPA)
            if ($is_bot = 1) {
                rewrite ^/$ /prerendered/index.html last;
                rewrite ^/(.+)$ /prerendered/$1.html last;
                # 如果静态文件不存在, /prerendered/ location 会 fallthrough
                # 到 @prerender-dynamic, 再到 @spa-fallback
            }
            # 普通用户: 标准 SPA 回退
            try_files $uri $uri/ /index.html;
        }

        # ── 预渲染静态文件 ──────────────────────────────────────────────
        # 仅允许内部 rewrite (爬虫检测), 外部直接访问返回 404
        # 文件不存在时: 先尝试 Puppeteer 动态预渲染 → 最后回退到 SPA 入口
        location ^~ /prerendered/ {
            internal;
            error_page 404 = @prerender-dynamic;
            try_files $uri =404;
        }

        # ── Puppeteer 动态预渲染 (作为静态文件不存在的 fallback) ────
        # 当静态预渲染文件不存在时, 将爬虫请求代理到 Puppeteer 预渲染服务
        # 进行实时 SSR 渲染, 返回完整 HTML.
        # 如果预渲染服务不可用, 则回退到 SPA 入口
        location @prerender-dynamic {
            # 检查上游是否已定义, 若未定义则直接回退到 SPA
            # Nginx 中无法直接检查 upstream 是否存在, 交由 proxy_pass 处理
            proxy_pass http://chainke-prerender/render?path=$uri&no_cache=false;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
            proxy_connect_timeout    10s;
            proxy_read_timeout       35s;  # 匹配 prerender 超时
            proxy_send_timeout       10s;
            # 若预渲染服务不可用 (502/503), 回退到 SPA
            proxy_next_upstream      error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            error_page 502 503 504 = @spa-fallback;
        }

        # SPA 回退: 用于预渲染文件不存在且动态渲染不可用时的兜底
        location @spa-fallback {
            rewrite ^ /index.html break;
        }

        # ── SPA 入口缓存策略 ────────────────────────────────────────────
        location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                expires -1;
            }
        }

        # ── 静态资源缓存（带 content hash 的文件） ─────────────────────
        # Vite 构建产物文件名含 hash，可安全长期缓存
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            # JS/CSS 文件不需要安全头中的 CSP 重复声明，但保持一致性
        }

        # 图片、字体、媒体等
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?|ttf|eot|otf|mp4|webm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;          # 静态资源不记日志，减少 I/O
        }

        # JSON / Web Manifest
        location ~* \.(json|webmanifest)$ {
            expires 7d;
            add_header Cache-Control "public, must-revalidate" always;
        }

        # ── Service Worker ──────────────────────────────────────────────
        # Service Worker 必须每次都检查更新，不能长期缓存
        location = /service-worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires -1;
        }

        # ── 支付模块路由 ──────────────────────────────────────────────
        # 独立配置文件，包含 /api/payment/ 和 /api/payment/callback/ 路由
        # 放在通用 /api/ 之前以确保更长前缀匹配优先
        include /etc/nginx/payment_location.conf;

        # ── 后端 API 反向代理 ───────────────────────────────────────────
        location /api/ {
            proxy_pass http://chainke-backend;
            proxy_http_version 1.1;

            # 标准代理头
            proxy_set_header Host                  $host;
            proxy_set_header X-Real-IP             $remote_addr;
            proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto     $scheme;
            proxy_set_header X-Forwarded-Host      $host;
            proxy_set_header X-Forwarded-Port      $server_port;

            # WebSocket 支持
            proxy_set_header Upgrade               $http_upgrade;
            proxy_set_header Connection            "upgrade";

            # 超时
            proxy_connect_timeout    60s;
            proxy_read_timeout       120s;
            proxy_send_timeout       60s;

            # 缓冲
            proxy_buffering          on;
            proxy_buffer_size        4k;
            proxy_buffers            8 16k;
            proxy_busy_buffers_size  32k;

            # 后端错误时尝试其他 upstream
            proxy_next_upstream      error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;

            # 透传客户端 IP（后端获取真实 IP）
            proxy_set_header X-Client-IP $remote_addr;
        }

        # ── 健康检查 ────────────────────────────────────────────────────
        location = /health {
            proxy_pass http://chainke-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
            # 只允许内部/监控系统访问（可选）
            #allow 10.0.0.0/8;
            #allow 172.16.0.0/12;
            #deny all;
        }

        # ── SEO 文件 ────────────────────────────────────────────────────
        location = /robots.txt {
            proxy_pass http://chainke-backend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400" always;
        }

        location = /sitemap.xml {
            proxy_pass http://chainke-backend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=3600" always;
        }

        # ── 拒绝访问非公开路径 ──────────────────────────────────────────
        location ~ /\.(git|env|ht) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location = /nginx.conf {
            deny all;
        }
    }

    # ═════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS 跳转
    # ═════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name liankebao.top www.liankebao.top _;

        # 除 health check 外的所有请求跳转到 HTTPS
        location = /health {
            proxy_pass http://chainke-backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═════════════════════════════════════════════════════════════════════
    # 备选：纯 HTTP 模式（开发/内网环境，无 SSL 证书时使用）
    # 将上方 HTTPS server 块注释，取消下方注释
    # ═════════════════════════════════════════════════════════════════════
    #server {
    #    listen 80;
    #    listen [::]:80;
    #    server_name _;
    #
    #    root  /app/frontend;
    #    index index.html;
    #
    #    # ── 安全头（HTTP 版，不含 HSTS） ────────────────────────────
    #    add_header X-Frame-Options          "SAMEORIGIN"  always;
    #    add_header X-Content-Type-Options   "nosniff"     always;
    #    add_header X-XSS-Protection         "1; mode=block" always;
    #    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    #    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    #
    #    # ── hreflang ─────────────────────────────────────────────────
    #    set $canonical_url "$scheme://$host$request_uri";
    #    add_header Link '<$canonical_url>; rel="canonical"';
    #    add_header Link '<$scheme://$host$request_uri>; rel="alternate"; hreflang="x-default"';
    #    add_header Link '<$scheme://$host$request_uri>; rel="alternate"; hreflang="zh-CN"';
    #
    #    # ── SPA 路由回退 ──────────────────────────────────────────
    #    location ~ ^/(.+)/$ {
    #        return 301 $scheme://$host/$1;
    #    }
    #
    #    location / {
    #        try_files $uri $uri/ /index.html;
    #        location = /index.html {
    #            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    #            expires -1;
    #        }
    #    }
    #
    #    # ── 静态资源缓存 ──────────────────────────────────────────
    #    location ~* \.(js|css)$ {
    #        expires 1y;
    #        add_header Cache-Control "public, immutable" always;
    #    }
    #    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?|ttf|eot|otf|mp4|webm)$ {
    #        expires 1y;
    #        add_header Cache-Control "public, immutable" always;
    #        access_log off;
    #    }
    #    location ~* \.(json|webmanifest)$ {
    #        expires 7d;
    #        add_header Cache-Control "public, must-revalidate" always;
    #    }
    #
    #    # ── API 代理 ────────────────────────────────────────────────
    #    location /api/ {
    #        proxy_pass http://chainke-backend;
    #        proxy_http_version 1.1;
    #        proxy_set_header Host $host;
    #        proxy_set_header X-Real-IP $remote_addr;
    #        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #        proxy_set_header X-Forwarded-Proto $scheme;
