# =============================================================================
# 链客宝 — 支付模块 Nginx 路由配置
# =============================================================================
# 功能:
#   1. /api/payment/* API 路由到后端（订单创建、查询等）
#   2. /api/payment/callback/* 支付回调路由（微信/支付宝异步通知）
#   3. 确保回调路径不被 SPA fallback (location /) 拦截
#   4. 回调请求体透传（支付平台验签需要原始请求体）
#
# 使用方式:
#   在 HTTPS server block 中，放在通用 location /api/ 之前:
#     include /etc/nginx/payment_location.conf;
#
#   或直接复制 location 块到 server block 中。
# =============================================================================

# ── 支付模块 API ─────────────────────────────────────────────────
# 优先级高于通用 location /api/（更长前缀匹配优先）
# 涵盖：订单创建、查询、退款等非回调业务
location /api/payment/ {
    proxy_pass http://chainke-backend;
    proxy_http_version 1.1;

    # 标准代理头
    proxy_set_header Host                  $host;
    proxy_set_header X-Real-IP             $remote_addr;
    proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto     $scheme;
    proxy_set_header X-Forwarded-Host      $host;
    proxy_set_header X-Forwarded-Port      $server_port;

    # WebSocket 支持（如需）
    proxy_set_header Upgrade               $http_upgrade;
    proxy_set_header Connection            "upgrade";

    # 超时
    proxy_connect_timeout    60s;
    proxy_read_timeout       120s;
    proxy_send_timeout       60s;

    # 缓冲
    proxy_buffering          on;
    proxy_buffer_size        4k;
    proxy_buffers            8 16k;
    proxy_busy_buffers_size  32k;

    # 后端错误时尝试其他 upstream
    proxy_next_upstream      error timeout invalid_header http_500 http_502 http_503;
    proxy_next_upstream_tries 3;

    # 透传客户端 IP
    proxy_set_header X-Client-IP $remote_addr;
}

# ── 支付回调 API ─────────────────────────────────────────────────
# 显式路由 /api/payment/callback/*，确保：
#   1. 不被 SPA fallback (location /) 拦截
#   2. 不被通用 /api/ location 的缓冲策略影响
#   3. 原始请求体透传（验签必需）
#
# 路径（由后端 payment_callback router 处理）:
#   POST /api/payment/callback/wxpay       — 微信支付异步回调
#   POST /api/payment/callback/alipay      — 支付宝异步回调
#   POST /api/payment/callback/wxpay/mock  — Mock 回调（开发测试）
location /api/payment/callback/ {
    proxy_pass http://chainke-backend;
    proxy_http_version 1.1;

    # 标准代理头
    proxy_set_header Host                  $host;
    proxy_set_header X-Real-IP             $remote_addr;
    proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto     $scheme;
    proxy_set_header X-Forwarded-Host      $host;
    proxy_set_header X-Forwarded-Port      $server_port;

    # ── 回调特定配置 ──

    # 1. 禁止缓冲请求体 — 微信/支付宝回调验签需要完整原始请求体
    #    nginx 缓冲会合并/修改请求体，导致验签失败
    proxy_request_buffering  off;
    proxy_buffering          off;

    # 2. 长超时 — 支付平台可能异步重试，后端处理可能耗时
    proxy_connect_timeout    30s;
    proxy_read_timeout       180s;
    proxy_send_timeout       60s;

    # 3. 关闭重试 — 回调幂等由后端保证，上层不再重试
    proxy_next_upstream      off;

    # 4. 大请求体支持 — 支付宝/微信回调可能携带较大数据
    client_max_body_size     10m;

    # 透传客户端 IP
    proxy_set_header X-Client-IP $remote_addr;
}
