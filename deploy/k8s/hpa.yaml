apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chainke-web-hpa
  namespace: chainke-prod
  labels:
    app: chainke-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chainke-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
