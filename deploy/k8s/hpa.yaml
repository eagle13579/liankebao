# ============================================================
# 链客宝AI — HorizontalPodAutoscaler (HPA)
# ============================================================
# 说明: 基于 CPU/内存利用率的自动弹性伸缩。
#       后端: 2~8 副本，CPU > 70% 或 内存 > 80% 触发扩容。
#       前端: 2~6 副本，CPU > 80% 触发扩容。
#       支持快速扩容 + 慢速缩容，避免频繁抖动。
# ============================================================

---
# ============================================================
# 后端 HPA — 2~8 副本
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chainke-backend-hpa
  namespace: chainke
  labels:
    app: chainke
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chainke-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      # 缩容冷却期 5 分钟，避免频繁抖动
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      # 快速扩容 — 立即响应流量高峰
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# ============================================================
# 前端 HPA — 2~6 副本
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chainke-frontend-hpa
  namespace: chainke
  labels:
    app: chainke
    component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chainke-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
