apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainke-web
  namespace: chainke-prod
  labels:
    app: chainke-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chainke-web
  template:
    metadata:
      labels:
        app: chainke-web
        tier: frontend
    spec:
      containers:
        - name: web
          image: liankebao/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: chainke-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
