# ============================================================
# 链客宝AI — ConfigMap (环境配置)
# ============================================================
# 说明: 通过 ConfigMap 注入非敏感环境变量到 Pod 中。
#       敏感信息（密码、密钥、Token）应使用 Secret 管理。
#       与 docker-compose.yml 和 .env.example 保持兼容。
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: chainke-config
  namespace: chainke
  labels:
    app: chainke
    component: config
data:
  # ==========================================================
  # 应用基本配置
  # ==========================================================
  APP_ENV: "production"
  TZ: "Asia/Shanghai"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONPATH: "/app/backend"

  # ==========================================================
  # 数据库配置 — 与 docker-compose.yml 兼容
  # ==========================================================
  DB_TYPE: "postgres"
  PG_HOST: "chainke-postgres.chainke.svc.cluster.local"
  PG_PORT: "5432"
  PG_DATABASE: "chainke"

  # ==========================================================
  # 日志级别
  # ==========================================================
  LOG_LEVEL: "INFO"

  # ==========================================================
  # Sentry 错误追踪
  # ==========================================================
  SENTRY_TRACES_SAMPLE_RATE: "0.2"
  SENTRY_ENVIRONMENT: "production"

  # ==========================================================
  # CORS 配置 — 与 .env.example 兼容
  # ==========================================================
  CORS_ORIGINS: "https://liankebao.top,https://api.liankebao.top,https://cdn.liankebao.top"

  # ==========================================================
  # JWT 配置 (非敏感部分)
  # ==========================================================
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # ==========================================================
  # 向量搜索/功能开关
  # ==========================================================
  USE_VECTOR_SEARCH: "0"

  # ==========================================================
  # 前端配置
  # ==========================================================
  VITE_API_BASE: "/lkapi"

  # ==========================================================
  # 支付相关配置 (域名级)
  # ==========================================================
  WXPAY_NOTIFY_URL: "https://api.liankebao.top/lkapi/wechat/pay/notify"
  WXPAY_REFUND_NOTIFY_URL: "https://api.liankebao.top/lkapi/wechat/refund/notify"
