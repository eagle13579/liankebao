# ============================================================
# 链客宝AI — Kustomization (部署清单聚合)
# ============================================================
# 说明: 通过 kustomize 统一管理所有 K8s 资源。
#       使用方式:
#         kustomize build deploy/k8s/ | kubectl apply -f -
#       或:
#         kubectl apply -k deploy/k8s/
#
#       覆盖值示例 (用于不同环境):
#         kustomize build deploy/k8s/ --edit
#         kubectl apply -k deploy/k8s/ --namespace=chainke
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ============================================================
# 命名空间
# ============================================================
namespace: chainke

# ============================================================
# 公共标签 (自动注入到所有资源)
# ============================================================
labels:
  - pairs:
      app: chainke
      managed-by: kustomize

# ============================================================
# 公共注解 (自动注入到所有资源)
# ============================================================
commonAnnotations:
  description: "链客宝AI (LianKeBao) - 数字名片与商务社交平台"
  team: "chainke-dev"

# ============================================================
# 资源清单
# ============================================================
resources:
  - namespace.yaml
  - configmap.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
  - hpa.yaml

# ============================================================
# Secret 资源 (通过 kubectl 或外部工具管理)
# ============================================================
# 注意: secrets.yaml 不在此处引用，因为包含敏感数据。
#       请通过以下方式之一管理:
#         (1) kubectl create secret generic chainke-secret ...
#         (2) External Secrets Operator
#         (3) Sealed Secrets
#       参见 secrets.yaml 模板文件。

# ============================================================
# 镜像标签 — 通过 CI/CD 动态注入 {VERSION}
# ============================================================
# 用法: kustomize edit set image \
#         registry.cn-hangzhou.aliyuncs.com/chainke/backend=<version> \
#         registry.cn-hangzhou.aliyuncs.com/chainke/frontend=<version>
#
# 示例:
#   kustomize edit set image \
#     registry.cn-hangzhou.aliyuncs.com/chainke/backend=v1.2.3 \
#     registry.cn-hangzhou.aliyuncs.com/chainke/frontend=v1.2.3
images:
  - name: registry.cn-hangzhou.aliyuncs.com/chainke/backend
    newTag: latest
  - name: registry.cn-hangzhou.aliyuncs.com/chainke/frontend
    newTag: latest

# ============================================================
# ConfigMap 生成器
# ============================================================
# 如果需要在部署时动态生成 ConfigMap，可在此处配置。
# 当前使用静态 configmap.yaml 文件。

# ============================================================
# 补丁策略
# ============================================================
# 以下为不同环境的补丁示例，取消注释并使用:
# patches:
#   - path: patches/production.yaml
#   - path: patches/staging.yaml
