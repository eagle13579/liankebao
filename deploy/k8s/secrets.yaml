# ============================================================
# 链客宝AI — Secrets 模板
# ============================================================
# 说明:
#   此文件为模板，实际部署前请复制为 secrets.yaml 并填入真实值。
#   在生产环境中，建议使用外部 Secret 管理工具:
#     - 阿里云 KMS + Sealed Secrets
#     - HashiCorp Vault (via CSI driver)
#     - External Secrets Operator (对接 AWS Secrets Manager / GCP Secret Manager)
#     - Mozilla SOPS
#
#   创建命令:
#     kubectl create secret generic chainke-secret \
#       --namespace=chainke \
#       --from-literal=PG_USER='chainke' \
#       --from-literal=PG_PASSWORD='***' \
#       --from-literal=SECRET_KEY='***' \
#       --from-literal=ENCRYPTION_KEY='***' \
#       --from-literal=GEMINI_API_KEY='***' \
#       --from-literal=SENTRY_DSN='***' \
#       --from-literal=WXPAY_MCHID='***' \
#       --from-literal=WXPAY_API_V3_KEY='***' \
#       --from-literal=WXPAY_CERT_SERIAL_NO='***' \
#       --from-literal=WXPAY_APPID='***' \
#       --from-literal=ALIPAY_APP_ID='***' \
#       --from-literal=ALIPAY_PRIVATE_KEY='***' \
#       --from-literal=SMTP_HOST='***' \
#       --from-literal=SMTP_PORT='587' \
#       --from-literal=SMTP_USER='***' \
#       --from-literal=SMTP_PASSWORD='***' \
#       --from-literal=SMTP_FROM='***' \
#       --from-literal=POSTHOG_API_KEY='***'
#
#   或者使用 kubectl apply -f 此文件（填入 base64 编码值）:
#     echo -n 'your-password' | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: chainke-secret
  namespace: chainke
  labels:
    app: chainke
    component: secret
type: Opaque
data:
  # ==========================================================
  # 数据库凭证 (base64 编码)
  # ==========================================================
  PG_USER: "Y2hhaW5rZQ=="           # chainke
  PG_PASSWORD: "PENIQU5HRU1FPg=="   # <CHANGEME>

  # ==========================================================
  # JWT / 加密密钥 (base64 编码)
  # ==========================================================
  SECRET_KEY: "PENIQU5HRU1FPg=="    # <CHANGEME>
  ENCRYPTION_KEY: ""                # <CHANGEME>

  # ==========================================================
  # AI API 密钥
  # ==========================================================
  GEMINI_API_KEY: ""                # <CHANGEME>

  # ==========================================================
  # 监控
  # ==========================================================
  SENTRY_DSN: ""                    # <CHANGEME>
  POSTHOG_API_KEY: ""               # <CHANGEME>

  # ==========================================================
  # 支付 — 微信支付 (V3)
  # ==========================================================
  WXPAY_MCHID: ""                   # <CHANGEME>
  WXPAY_API_V3_KEY: ""              # <CHANGEME>
  WXPAY_CERT_SERIAL_NO: ""          # <CHANGEME>
  WXPAY_APPID: ""                   # <CHANGEME>

  # ==========================================================
  # 支付 — 支付宝
  # ==========================================================
  ALIPAY_APP_ID: ""                 # <CHANGEME>
  ALIPAY_PRIVATE_KEY: ""            # <CHANGEME>

  # ==========================================================
  # 邮件通知 (SMTP)
  # ==========================================================
  SMTP_HOST: ""                     # <CHANGEME>
  SMTP_PORT: "NTg3"                 # 587
  SMTP_USER: ""                     # <CHANGEME>
  SMTP_PASSWORD: ""                 # <CHANGEME>
  SMTP_FROM: ""                     # <CHANGEME>
