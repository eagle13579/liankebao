# ============================================================
# 链客宝AI — Ingress (TLS + 多域名)
# ============================================================
# 说明:
#   - 支持多域名路由: 主域名 + API子域名 + CDN域名
#   - TLS 通过 cert-manager 自动签发 Let's Encrypt 证书
#   - 支持 Nginx Ingress / 阿里云 ALB Ingress 双模式
#   - HTTP 自动重定向到 HTTPS
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chainke-ingress
  namespace: chainke
  labels:
    app: chainke
    component: ingress
  annotations:
    # ========================================================
    # Ingress Controller 选择
    # ========================================================
    # Nginx Ingress (通用)
    kubernetes.io/ingress.class: "nginx"
    # 阿里云 ALB Ingress (阿里云环境)
    # kubernetes.io/ingress.class: "alb"

    # ========================================================
    # SSL/HTTPS 配置
    # ========================================================
    # HTTP 重定向到 HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # TLS 协议版本
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    # 加密套件
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    # HSTS (HTTP Strict Transport Security)
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-preload: "false"

    # ========================================================
    # 安全配置
    # ========================================================
    # 请求体最大大小 (匹配文件上传需求)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # 后端超时
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # 防止 XSS/点击劫持等
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";

    # ========================================================
    # cert-manager 注解 (自动签发 SSL 证书)
    # ========================================================
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: "http01"

    # ========================================================
    # 阿里云 ALB 特定注解 (阿里云环境取消上方 nginx 注解后启用)
    # ========================================================
    # alb.ingress.kubernetes.io/load-balancer-name: "chainke-alb"
    # alb.ingress.kubernetes.io/scheme: "internet"
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: "443"

spec:
  # ========================================================
  # TLS 配置 — cert-manager 自动管理
  # ========================================================
  tls:
    - hosts:
        - liankebao.top
        - api.liankebao.top
        - cdn.liankebao.top
      secretName: chainke-tls

  # ========================================================
  # 路由规则
  # ========================================================
  rules:
    # ========================================================
    # 主域名 -> 前端 SPA
    # ========================================================
    - host: liankebao.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chainke-frontend
                port:
                  number: 80

    # ========================================================
    # API 子域名 -> 后端服务
    # ========================================================
    - host: api.liankebao.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chainke-backend
                port:
                  number: 8001

    # ========================================================
    # CDN 子域名 -> 前端静态资源 (可配置单独的 CDN 缓存策略)
    # ========================================================
    - host: cdn.liankebao.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chainke-frontend
                port:
                  number: 80

---
# ============================================================
# cert-manager ClusterIssuer (Let's Encrypt 生产)
# ============================================================
# 说明: 全局证书签发器，所有 Ingress 共用。
#       部署前需确保 DNS 解析已指向 Ingress Controller 地址。
# ============================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: chainke
spec:
  acme:
    # 正式 API (生产环境)
    server: https://acme-v02.api.letsencrypt.org/directory
    # 测试 API (先测试，避免速率限制)
    # server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@liankebao.top
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
