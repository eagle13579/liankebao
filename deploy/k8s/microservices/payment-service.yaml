apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: chainke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: liankebao/payment-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_TYPE
          value: "sqlite"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: chainke
spec:
  selector:
    app: payment-service
  ports:
  - port: 8000
    targetPort: 8000
